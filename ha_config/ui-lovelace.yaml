title: FFT Farm Ops Theater
theme: farm_ops_theater
views:
  - title: Nexus
    path: nexus
    icon: mdi:hexagon-multiple
    type: sections
    max_columns: 4
    dense_section_placement: true
    badges: []
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: custom:button-card
            entity: input_text.agent_commentary
            show_name: false
            show_icon: false
            show_label: true
            label: |
              [[[
                const commentary = entity.state;
                const status = states['input_text.agent_status']?.state ?? 'Monitoring';
                if (!commentary) return '';
                return `<div style="text-align:left;line-height:1.5"><strong style="font-size:1.05rem;color:#f1f7ff">${status}</strong><br><span style="color:#c2d2eb;font-size:0.97rem">${commentary}</span></div>`;
              ]]]
            styles:
              card:
                - display: "[[[ return entity.state ? 'block' : 'none'; ]]]"
                - height: "[[[ return entity.state ? 'auto' : '0px'; ]]]"
                - min-height: "0 !important"
                - padding: "[[[ return entity.state ? '16px 20px' : '0'; ]]]"
                - overflow: hidden
                - background: rgba(4, 10, 20, 0.97)
                - border: "[[[ return entity.state ? '1px solid rgba(46,238,192,0.3)' : 'none'; ]]]"
                - border-left: "[[[ return entity.state ? '4px solid #2eeec0' : 'none'; ]]]"
                - border-radius: 12px
                - box-shadow: "[[[ return entity.state ? '0 0 36px rgba(46,238,192,0.14)' : 'none'; ]]]"
                - animation: "[[[ return entity.state ? 'agent-pulse 2.5s ease-in-out infinite' : 'none'; ]]]"
              label:
                - padding: "0"
                - white-space: normal
                - text-align: left
            extra_styles: |
              @keyframes agent-pulse {
                0%, 100% { border-left-color: #2eeec0; box-shadow: 0 0 36px rgba(46,238,192,0.14); }
                50% { border-left-color: #5db7ff; box-shadow: 0 0 36px rgba(93,183,255,0.20); }
              }
      - type: grid
        cards:
          - type: markdown
            content: |
              # FFT NEXUS
              <span style="font-size:1.02rem;color:#9fd0ff;">High-density operational cockpit for instant control, trend clarity, and visual impact.</span>
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(93, 183, 255, 0.4);
                  background: linear-gradient(130deg, rgba(17, 32, 56, 0.96), rgba(8, 13, 24, 0.96));
                  box-shadow: 0 18px 42px rgba(2, 9, 21, 0.78);
                }
          - type: custom:button-card
            entity: sensor.battery_level
            name: Autonomous Ops Pulse
            icon: mdi:radar
            show_state: true
            show_label: true
            label: |
              [[[
                const solar = states['sensor.solar_power']?.state ?? '-';
                const grid = states['sensor.power_consumption']?.state ?? '-';
                const water = states['sensor.water_tank_total']?.state ?? '-';
                return `Solar ${solar} kW  |  Grid ${grid} kW  |  Water ${water} gal`;
              ]]]
            styles:
              card:
                - border-radius: 22px
                - padding: 18px
                - background: linear-gradient(145deg, rgba(19, 49, 80, 0.98), rgba(13, 20, 33, 0.98))
                - border: 1px solid rgba(102, 193, 255, 0.45)
                - box-shadow: 0 14px 34px rgba(4, 13, 29, 0.74)
              grid:
                - grid-template-areas: '"i n" "i s" "l l"'
                - grid-template-columns: 64px 1fr
                - grid-template-rows: min-content min-content min-content
                - row-gap: 5px
              icon:
                - color: '#67d7ff'
                - width: 44px
              name:
                - font-size: 1.25rem
                - font-weight: 700
                - color: '#eaf6ff'
              state:
                - color: '#7df2c5'
                - font-size: 1.04rem
                - font-weight: 700
              label:
                - color: '#b4cdea'
                - font-size: 0.92rem
                - justify-self: start
            state:
              - operator: template
                value: |
                  [[[
                    return Number(entity?.state ?? 0) < 30;
                  ]]]
                styles:
                  card:
                    - border: 1px solid rgba(255, 120, 120, 0.75)
                    - box-shadow: 0 0 26px rgba(255, 108, 108, 0.32)
          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:button-card
                entity: switch.irrigation_north
                name: North Irrigation
                icon: mdi:sprinkler-variant
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.irrigation_south
                name: South Irrigation
                icon: mdi:sprinkler-variant
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.pump_main
                name: Main Pump
                icon: mdi:pump
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.backup_generator
                name: Backup Generator
                icon: mdi:generator-stationary
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.security_lights
                name: Security Lights
                icon: mdi:lightbulb-alert
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.perimeter_alarm
                name: Perimeter Alarm
                icon: mdi:shield-alert
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.greenhouse_heater_a
                name: GH Heater A
                icon: mdi:radiator
                show_state: true
                tap_action:
                  action: toggle
              - type: custom:button-card
                entity: switch.greenhouse_cooling_a
                name: GH Cooling A
                icon: mdi:fan
                show_state: true
                tap_action:
                  action: toggle
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(64, 222, 182, 0.36);
                  background: linear-gradient(140deg, rgba(10, 24, 38, 0.95), rgba(8, 13, 22, 0.95));
                }
          - type: custom:apexcharts-card
            header:
              show: true
              title: Ops Vitals (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 230
                toolbar:
                  show: false
                animations:
                  enabled: false
              stroke:
                curve: smooth
                width: 2
              legend:
                show: true
                position: top
                horizontalAlign: left
              grid:
                borderColor: '#294164'
                strokeDashArray: 3
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.farm_risk_index
                name: Risk
                color: '#ff6f7a'
              - entity: sensor.ops_efficiency_index
                name: Efficiency
                color: '#30e7bf'
              - entity: sensor.anomaly_score
                name: Anomaly
                color: '#bf98ff'
          - type: custom:bar-card
            title: Ops Pulse Inputs
            direction: right
            width: 72%
            height: 24px
            entities:
              - entity: sensor.solar_power
                name: Solar
                min: 0
                max: 250
              - entity: sensor.power_consumption
                name: Load
                min: 0
                max: 220
              - entity: sensor.battery_level
                name: Battery
                min: 0
                max: 100
              - entity: sensor.water_tank_total
                name: Water
                min: 0
                max: 120000
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Sparkline Matrix
              Fast visual read on trend direction without opening entity popups.
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mini-graph-card
                name: GH Temp A
                entities:
                  - sensor.greenhouse_temp_a
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                color_thresholds:
                  - value: 55
                    color: '#56bcff'
                  - value: 70
                    color: '#30e7bf'
                  - value: 80
                    color: '#ff7e72'
                show:
                  fill: fade
                  extrema: true
              - type: custom:mini-graph-card
                name: GH Temp B
                entities:
                  - sensor.greenhouse_temp_b
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                show:
                  fill: fade
                  extrema: true
              - type: custom:mini-graph-card
                name: GH Temp C
                entities:
                  - sensor.greenhouse_temp_c
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                show:
                  fill: fade
                  extrema: true
              - type: custom:mini-graph-card
                name: Moisture North
                entities:
                  - sensor.soil_moisture_north
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                show:
                  fill: fade
                  extrema: true
              - type: custom:mini-graph-card
                name: Moisture South
                entities:
                  - sensor.soil_moisture_south
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                show:
                  fill: fade
                  extrema: true
              - type: custom:mini-graph-card
                name: Wind MPH
                entities:
                  - sensor.wind_speed_mph
                hours_to_show: 12
                points_per_hour: 2
                line_width: 3
                animate: true
                show:
                  fill: fade
                  extrema: true
          - type: custom:bar-card
            title: Resource Depth Bars
            direction: right
            width: 70%
            height: 36px
            positions:
              icon: outside
              indicator: inside
              name: inside
              value: inside
            entities:
              - entity: sensor.water_tank_total
                name: Water Tank
                max: 120000
              - entity: sensor.battery_level
                name: Battery
                max: 100
              - entity: input_number.feed_silo_level
                name: Feed Silo
                max: 100
              - entity: input_number.generator_fuel_level
                name: Generator Fuel
                max: 100
              - entity: input_number.nitrogen_level_north
                name: Nitrogen North
                max: 100
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Power Matrix (Last 12h)
              show_states: true
            graph_span: 12h
            apex_config:
              chart:
                height: 320
                toolbar:
                  show: false
                animations:
                  enabled: false
              stroke:
                curve: smooth
                width: 2
              legend:
                show: true
                position: top
                horizontalAlign: left
              grid:
                borderColor: '#294164'
                strokeDashArray: 3
            all_series_config:
              group_by:
                func: avg
                duration: 20min
            yaxis:
              - id: power
                min: 0
                max: 220
              - id: pct
                opposite: true
                min: 0
                max: 100
            series:
              - entity: sensor.solar_power
                name: Solar
                yaxis_id: power
                type: area
                color: '#f59e0b'
              - entity: sensor.power_consumption
                name: Load
                yaxis_id: power
                type: line
                color: '#56bcff'
              - entity: sensor.battery_level
                name: Battery %
                yaxis_id: pct
                type: line
                color: '#30e7bf'
              - entity: input_number.generator_fuel_level
                name: Generator %
                yaxis_id: pct
                type: line
                color: '#ff6f7a'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Yield Vector (Last 24h)
              show_states: true
            graph_span: 24h
            apex_config:
              chart:
                type: bar
                height: 320
                toolbar:
                  show: false
                animations:
                  enabled: false
              plotOptions:
                bar:
                  borderRadius: 8
                  columnWidth: 54%
              legend:
                show: true
                position: top
                horizontalAlign: left
              grid:
                borderColor: '#294164'
                strokeDashArray: 3
            all_series_config:
              group_by:
                func: avg
                duration: 30min
            series:
              - entity: input_number.yield_grain_current
                name: Grain
                type: column
                color: '#ffb85c'
              - entity: input_number.yield_vegetables_current
                name: Vegetable
                type: column
                color: '#30e7bf'
              - entity: input_number.yield_fruit_current
                name: Fruit
                type: column
                color: '#56bcff'
              - entity: input_number.eggs_today
                name: Eggs
                type: line
                color: '#eab308'
              - entity: input_number.milk_today
                name: Milk
                type: line
                color: '#9d8bff'
      - type: grid
        cards:
          - type: custom:bar-card
            title: Facility Vitals Snapshot
            direction: right
            width: 70%
            height: 30px
            entities:
              - entity: sensor.greenhouse_temp_a
                name: GH A Temp
                min: 30
                max: 110
              - entity: sensor.greenhouse_temp_b
                name: GH B Temp
                min: 30
                max: 110
              - entity: sensor.water_tank_total
                name: Water Total
                min: 0
                max: 120000
              - entity: sensor.battery_level
                name: Battery
                min: 0
                max: 100
              - entity: sensor.wind_speed_mph
                name: Wind
                min: 0
                max: 100
          - type: grid
            columns: 3
            square: false
            cards:
              - type: iframe
                title: North Yard
                url: https://video.nest.com/embedded/live/CicGaHojwa?autoplay=1
                # Fallback (Farm Sanctuary): https://explore.org/livecams/farm-sanctuary/wisconsin-pasture-farm-sanctuary
                aspect_ratio: 56.25%
              - type: iframe
                title: Greenhouse
                url: https://video.nest.com/embedded/live/J3TrdvuJOU?autoplay=1
                # Fallback (Farm Sanctuary): https://explore.org/livecams/farm-sanctuary/sheep-barn-farm-sanctuary
                aspect_ratio: 56.25%
              - type: iframe
                title: Equipment
                url: https://video.nest.com/embedded/live/z4uWODIK19?autoplay=1
                # Fallback (Farm Sanctuary): https://explore.org/livecams/farm-sanctuary/turkey-barn-farm-sanctuary
                aspect_ratio: 56.25%
      - type: grid
        cards:
          - type: history-graph
            title: Security + Infrastructure Pulse (Last 12h)
            hours_to_show: 12
            refresh_interval: 30
            entities:
              - switch.security_lights
              - switch.perimeter_alarm
              - input_boolean.motion_sensor_barn
              - input_boolean.motion_sensor_equipment
              - switch.backup_generator
              - binary_sensor.storm_alert
          - type: entities
            title: Macro Channel Board
            show_header_toggle: false
            entities:
              - input_number.soil_ph_north
              - input_number.soil_ph_south
              - input_number.soil_ph_orchard
              - input_number.soil_ph_vegetable
              - input_number.nitrogen_level_north
              - input_number.nitrogen_level_south
              - input_number.phosphorus_level
              - input_number.potassium_level
              - input_number.water_ph_main
              - input_number.water_ph_nursery
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Entity Atlas: Boolean Fabric
              Full toggle matrix for automation channels that were previously hidden.
          - type: entities
            title: Boolean Fabric A
            show_header_toggle: false
            state_color: true
            entities:
              - input_boolean.alert_equipment_fault
              - input_boolean.alert_high_temp
              - input_boolean.alert_low_moisture
              - input_boolean.alert_low_temp
              - input_boolean.barn_fan
              - input_boolean.barn_heater
              - input_boolean.barn_lights
              - input_boolean.frost_protection
              - input_boolean.greenhouse_cooling_a
              - input_boolean.greenhouse_fog_system
              - input_boolean.greenhouse_heater_a
              - input_boolean.greenhouse_humidifier_a
              - input_boolean.greenhouse_humidifier_b
              - input_boolean.greenhouse_lights_a
              - input_boolean.greenhouse_lights_b
              - input_boolean.greenhouse_lights_c
              - input_boolean.pump_main_reservoir
              - input_boolean.greenhouse_shade_a
              - input_boolean.greenhouse_shade_b
          - type: entities
            title: Boolean Fabric B
            show_header_toggle: false
            state_color: true
            entities:
              - input_boolean.greenhouse_shade_c
              - input_boolean.greenhouse_vent_a
              - input_boolean.irrigation_drip_main
              - input_boolean.irrigation_east_orchard
              - input_boolean.irrigation_grain_silo_a
              - input_boolean.irrigation_grain_silo_b
              - input_boolean.irrigation_misting_system
              - switch.irrigation_north
              - input_boolean.irrigation_north_field
              - input_boolean.irrigation_nursery
              - switch.irrigation_south
              - input_boolean.irrigation_south_field
              - input_boolean.irrigation_vegetable_field
              - input_boolean.irrigation_west_pasture
              - input_boolean.pump_well_1
              - input_boolean.pump_well_2
              - input_boolean.rain_detected
              - input_boolean.storm_shutters
              - input_boolean.tractor_charger
              - switch.frost_protection
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Entity Atlas: Raw Numeric Mesh
              Direct helper channels for calibration, QA, and synthetic replay.
          - type: custom:apexcharts-card
            header:
              show: true
              title: Raw Moisture/Tank Overlay (Last 12h)
            graph_span: 12h
            apex_config:
              chart:
                height: 300
                toolbar:
                  show: false
                animations:
                  enabled: false
              stroke:
                curve: smooth
                width: 2
              legend:
                show: true
                position: top
                horizontalAlign: left
              grid:
                borderColor: '#294164'
                strokeDashArray: 3
            all_series_config:
              group_by:
                func: avg
                duration: 20min
            yaxis:
              - id: moisture
                min: 0
                max: 100
              - id: tank
                opposite: true
                min: 0
                max: 120000
            series:
              - entity: input_number.soil_moisture_north_field
                name: North Field
                yaxis_id: moisture
                type: line
                color: '#56bcff'
              - entity: input_number.soil_moisture_south_field
                name: South Field
                yaxis_id: moisture
                type: line
                color: '#30e7bf'
              - entity: input_number.soil_moisture_vegetable_field
                name: Vegetable
                yaxis_id: moisture
                type: line
                color: '#ffb85c'
              - entity: input_number.tank_level_main
                name: Tank Main
                yaxis_id: tank
                type: area
                color: '#9d8bff'
              - entity: input_number.tank_level_secondary
                name: Tank Secondary
                yaxis_id: tank
                type: area
                color: '#ff6f7a'
          - type: entities
            title: Numeric Mesh A
            show_header_toggle: false
            entities:
              - input_number.barn_temp
              - input_number.barometric_pressure
              - input_number.cattle_count
              - input_number.chicken_coop_temp
              - input_number.chicken_count
              - input_number.greenhouse_light_level_a
              - input_number.greenhouse_light_level_b
              - input_number.greenhouse_light_level_c
              - sensor.greenhouse_temp_avg
              - input_number.greenhouse_temp_section_a
              - input_number.greenhouse_temp_section_b
              - input_number.greenhouse_temp_section_c
              - input_number.outdoor_humidity
              - input_number.outdoor_light_level
              - input_number.outdoor_temp_east
              - input_number.outdoor_temp_north
              - input_number.outdoor_temp_south
          - type: entities
            title: Numeric Mesh B
            show_header_toggle: false
            entities:
              - input_number.outdoor_temp_west
              - input_number.soil_moisture_east_orchard
              - input_number.soil_moisture_grain_silo_a
              - input_number.soil_moisture_grain_silo_b
              - sensor.soil_moisture_north
              - input_number.soil_moisture_north_field
              - input_number.soil_moisture_nursery
              - sensor.soil_moisture_south
              - input_number.soil_moisture_south_field
              - input_number.soil_moisture_vegetable_field
              - input_number.soil_moisture_west_pasture
              - sensor.water_tank_total
              - input_number.tank_level_main
              - input_number.tank_level_nursery
              - input_number.tank_level_secondary
              - input_number.water_trough_level_1
              - input_number.water_trough_level_2
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Entity Atlas: Meta + System Surface
              Backup telemetry, system entities, to-do, and location channels.
          - type: map
            default_zoom: 13
            entities:
              - zone.home
              - person.administrator
          - type: todo-list
            entity: todo.shopping_list
            title: Operations Checklist
          - type: entities
            title: Backup/System Channels
            show_header_toggle: false
            entities:
              - event.backup_automatic_backup
              - sensor.backup_backup_manager_state
              - sensor.backup_last_attempted_automatic_backup
              - sensor.backup_last_successful_automatic_backup
              - sensor.backup_next_scheduled_automatic_backup
              - tts.google_translate_en_com
  - title: War Room
    path: war-room
    icon: mdi:monitor-dashboard
    panel: true
    badges: []
    kiosk_mode:
      hide_header: true
      hide_sidebar: true
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-gap: 10px
          grid-template-columns: repeat(12, minmax(0, 1fr))
          grid-template-rows: minmax(150px, 18vh) minmax(250px, 30vh) minmax(250px, 30vh) minmax(200px, 22vh)
          grid-template-areas: |
            "hero hero hero mission mission mission incidents incidents incidents mode mode mode"
            "trend trend trend trend trend trend pressure pressure pressure threat threat threat"
            "floor floor floor floor floor floor camera_n camera_n camera_g camera_g camera_e camera_e"
            "resources resources resources resources timeline timeline timeline timeline state state state state"
          mediaquery:
            "(max-width: 900px)":
              grid-gap: 8px
              grid-template-columns: 1fr
              grid-template-rows: repeat(14, minmax(180px, auto))
              grid-template-areas: |
                "hero"
                "mission"
                "incidents"
                "mode"
                "trend"
                "pressure"
                "threat"
                "floor"
                "camera_n"
                "camera_g"
                "camera_e"
                "resources"
                "timeline"
                "state"
            "(min-width: 901px) and (max-width: 1400px)":
              grid-gap: 9px
              grid-template-columns: repeat(6, minmax(0, 1fr))
              grid-template-rows: minmax(120px, auto) repeat(5, minmax(220px, auto))
              grid-template-areas: |
                "hero hero mission mission incidents incidents"
                "mode mode trend trend trend trend"
                "pressure pressure pressure threat threat threat"
                "floor floor floor floor camera_n camera_g"
                "resources resources timeline timeline camera_e camera_e"
                "state state state state state state"
        cards:
          - type: markdown
            view_layout:
              grid-area: hero
            content: |
              # WAR ROOM NEXUS
              **Zero-dead-space tactical wall for live operations.**
              Kiosk endpoint: `/lovelace/war-room?kiosk`
          - type: grid
            view_layout:
              grid-area: mission
            columns: 3
            square: false
            cards:
              - type: custom:button-card
                entity: sensor.farm_risk_index
                name: Risk
                icon: mdi:alert-octagon
                show_label: true
                label: Threat
                styles:
                  card:
                    - border-radius: 16px
                    - border: 1px solid rgba(255, 111, 122, 0.6)
                    - background: linear-gradient(145deg, rgba(47, 10, 16, 0.96), rgba(16, 8, 12, 0.96))
                  icon:
                    - color: '#ff6f7a'
                  state:
                    - font-size: 1.8rem
                    - font-weight: 800
              - type: custom:button-card
                entity: sensor.ops_efficiency_index
                name: Efficiency
                icon: mdi:speedometer
                show_label: true
                label: Output
                styles:
                  card:
                    - border-radius: 16px

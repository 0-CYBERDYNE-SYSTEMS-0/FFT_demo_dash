  # Command Center View Template
  # Farm operations command wall in 3-chamber sections layout

  - title: Command Center
    path: command-center
    icon: mdi:view-dashboard
    type: sections
    max_columns: 3
    dense_section_placement: true
    badges: []
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Farm Ops Chamber
              Incident + actuator controls for irrigation, climate, pumps, and security.
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: binary_sensor.irrigation_active
                icon: mdi:sprinkler-variant
                content_info: state
              - type: entity
                entity: binary_sensor.pumps_running
                icon: mdi:pump
                content_info: state
              - type: entity
                entity: binary_sensor.storm_alert
                icon: mdi:weather-lightning
                content_info: state
              - type: entity
                entity: binary_sensor.low_water_storage
                icon: mdi:water-alert
                content_info: state
              - type: entity
                entity: sensor.battery_level
                icon: mdi:battery
                content_info: state
              - type: entity
                entity: input_select.incident_mode
                icon: mdi:alert-decagram
                content_info: state
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Storm
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Intrusion
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Power Failure
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Clear
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
          - type: heading
            heading: Irrigation
            icon: mdi:sprinkler-variant

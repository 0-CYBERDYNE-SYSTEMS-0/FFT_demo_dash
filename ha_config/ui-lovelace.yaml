title: FFT Agent Monitoring
views:
  - title: Primary Command Center
    path: primary-command-center
    icon: mdi:view-dashboard-variant
    type: sections
    max_columns: 3
    sections:

      # ── COLUMN 1 ── System Status + Greenhouse Environment ─────────────────
      - type: grid
        cards:
          - type: markdown
            title: "🌿 FFT Primary Command Center"
            content: |
              ## Farm Operations — Live Status
              **Irrigation Active:** {{ states('binary_sensor.irrigation_active') | upper }}  |  **Pumps Running:** {{ states('binary_sensor.pumps_running') | upper }}
              **Last Update:** {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              *All toggles reflect live device state. Changes are immediate.*

      # ── COLUMN 2 ── Greenhouse Environmental Conditions ────────────────────
      - type: grid
        cards:
          - type: glance
            title: "🌡️ Greenhouse Environmental Conditions"
            columns: 3
            entities:
              - entity: sensor.greenhouse_temp_a
                name: "GH-A Temp"
              - entity: sensor.greenhouse_temp_b
                name: "GH-B Temp"
              - entity: sensor.greenhouse_temp_c
                name: "GH-C Temp"
              - entity: input_number.greenhouse_humidity_a
                name: "GH-A Humidity"
              - entity: input_number.greenhouse_humidity_b
                name: "GH-B Humidity"
              - entity: input_number.greenhouse_humidity_c
                name: "GH-C Humidity"
              - entity: input_number.greenhouse_light_level_a
                name: "GH-A Light"
              - entity: input_number.greenhouse_light_level_b
                name: "GH-B Light"
              - entity: input_number.greenhouse_light_level_c
                name: "GH-C Light"

      # ── COLUMN 3 ── Farm-Wide Metrics + Active Alerts ──────────────────────
      - type: grid
        cards:
          - type: glance
            title: "📊 Farm-Wide Key Metrics"
            columns: 3
            entities:
              - entity: sensor.outdoor_temp_avg
                name: "Outdoor Temp"
              - entity: sensor.wind_speed_mph
                name: "Wind Speed"
              - entity: sensor.battery_level
                name: "Battery"
              - entity: sensor.solar_power
                name: "Solar kW"
              - entity: sensor.power_consumption
                name: "Grid kW"
              - entity: sensor.water_tank_total
                name: "Water Total"
              - entity: sensor.cattle_count
                name: "Cattle"
              - entity: sensor.chicken_count
                name: "Chickens"
              - entity: sensor.grain_yield
                name: "Grain Yield"
          - type: entity-filter
            title: "⚠️ Active Alerts"
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.frost_risk
              - binary_sensor.heat_warning
              - binary_sensor.high_wind_alert
              - binary_sensor.storm_alert
              - binary_sensor.greenhouse_too_hot
              - binary_sensor.greenhouse_too_cold
              - binary_sensor.low_water_storage
              - binary_sensor.low_soil_moisture_north
              - binary_sensor.low_soil_moisture_south
              - binary_sensor.barn_too_cold
              - binary_sensor.motion_detected_barn
              - binary_sensor.motion_detected_equipment

      # ── GREENHOUSE A — Climate Controls ────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🌿 Greenhouse A — Climate Controls"
            entities:
              - entity: switch.greenhouse_heater_a
                name: "Heater — Greenhouse A"
              - entity: switch.greenhouse_cooling_a
                name: "Cooling — Greenhouse A"
              - entity: switch.greenhouse_vent_a
                name: "Ventilation — Greenhouse A"
              - entity: input_boolean.greenhouse_shade_a
                name: "Shade Screen — Greenhouse A"
              - entity: input_boolean.greenhouse_humidifier_a
                name: "Humidifier — Greenhouse A"
              - entity: input_boolean.greenhouse_lights_a
                name: "Grow Lights — Greenhouse A"

      # ── GREENHOUSE B — Climate Controls ────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🌿 Greenhouse B — Climate Controls"
            entities:
              - entity: input_boolean.greenhouse_heater_b
                name: "Heater — Greenhouse B"
              - entity: input_boolean.greenhouse_cooling_b
                name: "Cooling — Greenhouse B"
              - entity: input_boolean.greenhouse_vent_b
                name: "Ventilation — Greenhouse B"
              - entity: input_boolean.greenhouse_shade_b
                name: "Shade Screen — Greenhouse B"
              - entity: input_boolean.greenhouse_humidifier_b
                name: "Humidifier — Greenhouse B"
              - entity: input_boolean.greenhouse_lights_b
                name: "Grow Lights — Greenhouse B"

      # ── GREENHOUSE C — Climate Controls ────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🌿 Greenhouse C — Climate Controls"
            entities:
              - entity: input_boolean.greenhouse_heater_c
                name: "Heater — Greenhouse C"
              - entity: input_boolean.greenhouse_cooling_c
                name: "Cooling — Greenhouse C"
              - entity: input_boolean.greenhouse_vent_c
                name: "Ventilation — Greenhouse C"
              - entity: input_boolean.greenhouse_shade_c
                name: "Shade Screen — Greenhouse C"
              - entity: input_boolean.greenhouse_fog_system
                name: "Fog System — All Greenhouses"
              - entity: input_boolean.greenhouse_lights_c
                name: "Grow Lights — Greenhouse C"

      # ── IRRIGATION ZONE CONTROLS ────────────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "💧 Irrigation Zone Controls"
            entities:
              - entity: switch.irrigation_north
                name: "Irrigation — North Field"
              - entity: switch.irrigation_south
                name: "Irrigation — South Field"
              - entity: switch.irrigation_west_pasture
                name: "Irrigation — West Pasture"
              - entity: switch.irrigation_east_orchard
                name: "Irrigation — East Orchard"
              - entity: switch.irrigation_vegetable
                name: "Irrigation — Vegetable Field"
              - entity: switch.irrigation_nursery
                name: "Irrigation — Nursery"

      # ── IRRIGATION EXTENDED + MISTING ───────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "💧 Irrigation Extended & Misting"
            entities:
              - entity: input_boolean.irrigation_grain_silo_a
                name: "Irrigation — Grain Silo A"
              - entity: input_boolean.irrigation_grain_silo_b
                name: "Irrigation — Grain Silo B"
              - entity: input_boolean.irrigation_drip_main
                name: "Drip System — Main Line"
              - entity: input_boolean.irrigation_misting_system
                name: "Misting System — All Zones"
              - entity: input_boolean.pump_fertilizer_injection
                name: "Fertilizer Injection Pump"
              - entity: input_boolean.pump_rainwater
                name: "Rainwater Pump"

      # ── WATER PUMP CONTROLS ─────────────────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🔧 Water Pump Controls"
            entities:
              - entity: switch.pump_well_1
                name: "Pump — Well 1"
              - entity: switch.pump_well_2
                name: "Pump — Well 2"
              - entity: switch.pump_main
                name: "Pump — Main Reservoir"
              - entity: input_boolean.pump_secondary_tank
                name: "Pump — Secondary Tank"
              - entity: input_boolean.pump_pond_circulation
                name: "Pump — Pond Circulation"

      # ── POWER SYSTEM CONTROLS ───────────────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "⚡ Power System Controls"
            entities:
              - entity: switch.backup_generator
                name: "Backup Generator — Engage"
              - entity: switch.rain_sensors
                name: "Rain Sensor Override"
              - entity: switch.frost_protection
                name: "Frost Protection Override"
              - entity: input_boolean.tractor_charger
                name: "Tractor — Battery Charger"
              - entity: input_boolean.storm_shutters
                name: "Storm Shutters — Deploy"

      # ── SECURITY CONTROLS ───────────────────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🔒 Security Controls"
            entities:
              - entity: switch.perimeter_alarm
                name: "Perimeter Alarm — Armed"
              - entity: switch.security_lights
                name: "Security Lights — Perimeter"
              - entity: input_boolean.gate_lock_main
                name: "Gate Lock — Main Entry"
              - entity: input_boolean.gate_lock_secondary
                name: "Gate Lock — Secondary Entry"
              - entity: input_boolean.outdoor_flood_lights
                name: "Outdoor Flood Lights"
              - entity: input_boolean.barn_lights
                name: "Barn Lights"

      # ── LIVESTOCK & BARN CONTROLS ───────────────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: "🐄 Livestock & Barn Controls"
            entities:
              - entity: switch.barn_heater
                name: "Heater — Barn"
              - entity: switch.barn_fan
                name: "Fan — Barn Ventilation"
              - entity: input_boolean.automatic_feeder_1
                name: "Automatic Feeder — Station 1"
              - entity: input_boolean.automatic_feeder_2
                name: "Automatic Feeder — Station 2"
              - entity: input_boolean.livestock_water_heater
                name: "Water Heater — Livestock"
              - entity: input_boolean.chicken_coop_heater
                name: "Heater — Chicken Coop"
              - entity: input_boolean.chicken_coop_fan
                name: "Fan — Chicken Coop"

  - title: Agent Command Center
    path: command-center
    icon: mdi:robot
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: markdown
            title: System Status Banner
            content: |
              ## FFT Farm Agent Control Plane
              - Irrigation Active: **{{ states('binary_sensor.irrigation_active') }}**
              - Pumps Running: **{{ states('binary_sensor.pumps_running') }}**
              - Last Refresh: **{{ now().strftime('%Y-%m-%d %H:%M:%S') }}**
              This dashboard is optimized for agent-driven operations and state-change observability.
          - type: glance
            title: Key Metrics
            columns: 4
            entities:
              - sensor.outdoor_temp_avg
              - sensor.wind_speed_mph
              - sensor.water_tank_total
              - sensor.water_tank_main
              - sensor.solar_power
              - sensor.power_consumption
              - sensor.battery_level
              - sensor.grain_yield
              - sensor.cattle_count
              - sensor.chicken_count
              - sensor.barn_temperature
              - sensor.greenhouse_humidity_avg
      - type: grid
        cards:
          - type: entity-filter
            title: Active Operations
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - switch.irrigation_north
              - switch.irrigation_south
              - switch.irrigation_east_orchard
              - switch.irrigation_west_pasture
              - switch.irrigation_vegetable
              - switch.irrigation_nursery
              - switch.pump_well_1
              - switch.pump_well_2
              - switch.pump_main
              - switch.greenhouse_heater_a
              - switch.greenhouse_cooling_a
              - switch.greenhouse_vent_a
              - switch.backup_generator
              - switch.perimeter_alarm
              - switch.security_lights
          - type: entity-filter
            title: Alert Feed
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.frost_risk
              - binary_sensor.heat_warning
              - binary_sensor.high_wind_alert
              - binary_sensor.storm_alert
              - binary_sensor.low_water_storage
              - binary_sensor.low_soil_moisture_north
              - binary_sensor.low_soil_moisture_south
              - binary_sensor.greenhouse_too_hot
              - binary_sensor.greenhouse_too_cold
              - binary_sensor.barn_too_cold
              - binary_sensor.motion_detected_barn
              - binary_sensor.motion_detected_equipment
          - type: logbook
            title: Recent Activity (Last 1 Hour)
            hours_to_show: 1

  - title: Field Operations
    path: field-operations
    icon: mdi:sprout
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: markdown
            title: Soil and Irrigation
            content: |
              ## Soil Moisture + Zone Control
              Moisture values are telemetry targets; switches and booleans are agent control channels.
          - type: glance
            title: Soil Moisture
            columns: 3
            entities:
              - sensor.soil_moisture_north
              - sensor.soil_moisture_south
              - sensor.soil_moisture_west_pasture
              - sensor.soil_moisture_east_orchard
              - sensor.soil_moisture_vegetable
              - sensor.soil_moisture_nursery
          - type: entities
            title: Irrigation Switches
            entities:
              - switch.irrigation_north
              - switch.irrigation_south
              - switch.irrigation_west_pasture
              - switch.irrigation_east_orchard
              - switch.irrigation_vegetable
              - switch.irrigation_nursery
          - type: entities
            title: Extended Irrigation Controls
            entities:
              - input_boolean.irrigation_drip_main
              - input_boolean.irrigation_misting_system
              - input_boolean.irrigation_grain_silo_a
              - input_boolean.irrigation_grain_silo_b
      - type: grid
        cards:
          - type: entities
            title: Water System
            entities:
              - sensor.water_tank_main
              - sensor.water_tank_secondary
              - sensor.water_tank_nursery
              - sensor.water_tank_total
              - input_number.tank_level_main
              - input_number.tank_level_secondary
              - input_number.tank_level_nursery
              - switch.pump_well_1
              - switch.pump_well_2
              - switch.pump_main
          - type: glance
            title: Nutrient Status
            entities:
              - input_number.soil_ph_north
              - input_number.soil_ph_south
              - input_number.soil_ph_vegetable
              - input_number.soil_ph_orchard
              - input_number.nitrogen_level_north
              - input_number.nitrogen_level_south
              - input_number.phosphorus_level
              - input_number.potassium_level

  - title: Climate and Greenhouse
    path: climate-greenhouse
    icon: mdi:greenhouse
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: glance
            title: Greenhouse Sections
            entities:
              - sensor.greenhouse_temp_a
              - sensor.greenhouse_temp_b
              - sensor.greenhouse_temp_c
              - input_number.greenhouse_humidity_a
              - input_number.greenhouse_humidity_b
              - input_number.greenhouse_humidity_c
          - type: entities
            title: Greenhouse Controls A
            entities:
              - switch.greenhouse_heater_a
              - switch.greenhouse_cooling_a
              - switch.greenhouse_vent_a
              - input_boolean.greenhouse_shade_a
              - input_boolean.greenhouse_humidifier_a
          - type: entities
            title: Greenhouse Controls B/C
            entities:
              - input_boolean.greenhouse_heater_b
              - input_boolean.greenhouse_cooling_b
              - input_boolean.greenhouse_vent_b
              - input_boolean.greenhouse_shade_b
              - input_boolean.greenhouse_humidifier_b
              - input_boolean.greenhouse_heater_c
              - input_boolean.greenhouse_cooling_c
              - input_boolean.greenhouse_vent_c
              - input_boolean.greenhouse_shade_c
          - type: entity-filter
            title: Climate Alerts
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.frost_risk
              - binary_sensor.heat_warning
              - binary_sensor.high_wind_alert
              - binary_sensor.greenhouse_too_hot
              - binary_sensor.greenhouse_too_cold

  - title: Operations and Livestock
    path: operations-livestock
    icon: mdi:cow
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: glance
            title: Livestock Panel
            entities:
              - sensor.cattle_count
              - sensor.chicken_count
              - sensor.barn_temperature
              - input_number.barn_humidity
              - input_number.feed_silo_level
              - input_number.eggs_today
              - input_number.milk_today
          - type: entities
            title: Livestock Controls
            entities:
              - switch.barn_heater
              - switch.barn_fan
              - input_boolean.automatic_feeder_1
              - input_boolean.automatic_feeder_2
              - input_boolean.livestock_water_heater
          - type: entity-filter
            title: Livestock Alerts
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.barn_too_cold
      - type: grid
        cards:
          - type: glance
            title: Equipment
            entities:
              - input_number.tractor_fuel
              - input_number.harvester_fuel
              - input_number.truck_fuel_1
              - input_number.truck_fuel_2
              - binary_sensor.tractor_available
              - binary_sensor.harvester_available
          - type: entities
            title: Storage and Yield
            entities:
              - input_number.grain_storage_temp_a
              - input_number.grain_storage_temp_b
              - input_number.cold_storage_temp
              - sensor.grain_yield
              - input_number.yield_vegetables_current
              - input_number.yield_fruit_current

  - title: Power and Security
    path: power-security
    icon: mdi:shield-home
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: glance
            title: Energy
            entities:
              - sensor.solar_power
              - sensor.power_consumption
              - sensor.battery_level
              - input_number.generator_fuel_level
              - switch.backup_generator
              - input_number.grid_power_consumption
              - input_number.solar_generation_kw
              - input_number.battery_storage_pct
          - type: entity-filter
            title: Power Alerts
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.low_water_storage
              - binary_sensor.storm_alert
      - type: grid
        cards:
          - type: entities
            title: Security
            entities:
              - switch.perimeter_alarm
              - switch.security_lights
              - switch.rain_sensors
              - input_boolean.gate_lock_main
              - input_boolean.gate_lock_secondary
          - type: entity-filter
            title: Active Security Alerts
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.motion_detected_barn
              - binary_sensor.motion_detected_equipment
              - binary_sensor.storm_alert
      - type: grid
        cards:
          - type: logbook
            title: Security and Power Activity (Last 2 Hours)
            hours_to_show: 2

title: FFT Farm Ops Theater
theme: farm_ops_theater
views:
  - title: Command Center
    path: command-center
    icon: mdi:radar
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: markdown
            title: FFT Farm Command Center
            content: |
              ## Live Agent Operations
              Core overview with readable telemetry and active control states.
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: binary_sensor.irrigation_active
                icon: mdi:sprinkler-variant
              - type: entity
                entity: binary_sensor.pumps_running
                icon: mdi:pump
              - type: entity
                entity: binary_sensor.low_water_storage
                icon: mdi:water-alert
              - type: entity
                entity: binary_sensor.storm_alert
                icon: mdi:weather-lightning
              - type: entity
                entity: sensor.battery_level
                icon: mdi:battery
          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.outdoor_temp_avg
                name: Outdoor Temp
              - type: custom:mushroom-entity-card
                entity: sensor.wind_speed_mph
                name: Wind
              - type: custom:mushroom-entity-card
                entity: sensor.water_tank_total
                name: Total Water
              - type: custom:mushroom-entity-card
                entity: sensor.solar_power
                name: Solar
              - type: custom:mushroom-entity-card
                entity: sensor.power_consumption
                name: Power Use
              - type: custom:mushroom-entity-card
                entity: sensor.battery_level
                name: Battery
              - type: custom:mushroom-entity-card
                entity: sensor.cattle_count
                name: Cattle
              - type: custom:mushroom-entity-card
                entity: sensor.chicken_count
                name: Chickens
          - type: custom:apexcharts-card
            header:
              show: true
              title: Soil Moisture (Last 3h)
              show_states: true
            graph_span: 3h
            apex_config:
              stroke:
                curve: smooth
              yaxis:
                decimalsInFloat: 1
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.soil_moisture_north
                name: North
                color: '#32d296'
                group_by:
                  func: avg
                  duration: 10min
              - entity: sensor.soil_moisture_south
                name: South
                color: '#00b8ff'
                group_by:
                  func: avg
                  duration: 10min
              - entity: sensor.soil_moisture_west_pasture
                name: West
                color: '#ffd166'
                group_by:
                  func: avg
                  duration: 10min
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Total Water (Last 3h)
              show_states: true
            graph_span: 3h
            apex_config:
              stroke:
                curve: smooth
            yaxis:
              - min: 60000
                max: 120000
            series:
              - entity: sensor.water_tank_total
                name: Water Total
                color: '#2dd4bf'
                group_by:
                  func: avg
                  duration: 10min
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energy Rail (Last 3h)
              show_states: true
            graph_span: 3h
            apex_config:
              stroke:
                curve: smooth
            yaxis:
              - min: 0
                max: 200
              - opposite: true
                min: 0
                max: 100
            series:
              - entity: sensor.solar_power
                name: Solar
                color: '#ffd166'
                group_by:
                  func: avg
                  duration: 10min
              - entity: sensor.power_consumption
                name: Consumption
                color: '#ef476f'
                group_by:
                  func: avg
                  duration: 10min
              - entity: sensor.battery_level
                name: Battery %
                yaxis_id: 2
                color: '#06d6a0'
                group_by:
                  func: avg
                  duration: 10min
          - type: entity-filter
            title: Active Operations
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - switch.irrigation_north
              - switch.irrigation_south
              - switch.irrigation_west_pasture
              - switch.irrigation_east_orchard
              - switch.irrigation_vegetable
              - switch.irrigation_nursery
              - switch.pump_well_1
              - switch.pump_well_2
              - switch.pump_main
              - switch.greenhouse_heater_a
              - switch.greenhouse_cooling_a
              - switch.greenhouse_vent_a
              - switch.security_lights
              - switch.perimeter_alarm
          - type: logbook
            title: Agent Action Timeline (Last 2h)
            hours_to_show: 2

  - title: Irrigation
    path: irrigation
    icon: mdi:sprinkler
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_north
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_south
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_west_pasture
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_east_orchard
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_vegetable
              - type: custom:mushroom-entity-card
                entity: switch.irrigation_nursery
          - type: custom:apexcharts-card
            header:
              show: true
              title: Zone Moisture Comparator (Last 6h)
            graph_span: 6h
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.soil_moisture_north
                name: North
              - entity: sensor.soil_moisture_south
                name: South
              - entity: sensor.soil_moisture_west_pasture
                name: West
              - entity: sensor.soil_moisture_east_orchard
                name: East
              - entity: sensor.soil_moisture_vegetable
                name: Vegetable
              - entity: sensor.soil_moisture_nursery
                name: Nursery
      - type: grid
        cards:
          - type: entities
            title: Pump Controls
            entities:
              - switch.pump_well_1
              - switch.pump_well_2
              - switch.pump_main
              - input_boolean.pump_main_reservoir
              - input_boolean.pump_secondary_tank
              - input_boolean.pump_pond_circulation
              - input_boolean.pump_rainwater
              - input_boolean.pump_fertilizer_injection
          - type: gauge
            entity: sensor.water_tank_main
            name: Main Tank
            min: 0
            max: 100000
          - type: gauge
            entity: sensor.water_tank_secondary
            name: Secondary Tank
            min: 0
            max: 50000
          - type: gauge
            entity: sensor.water_tank_nursery
            name: Nursery Tank
            min: 0
            max: 5000

  - title: Energy
    path: energy
    icon: mdi:solar-power
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Solar vs Consumption (12h)
              show_states: true
            graph_span: 12h
            series:
              - entity: sensor.solar_power
                name: Solar
                color: '#ffd166'
              - entity: sensor.power_consumption
                name: Consumption
                color: '#ef476f'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Battery and Grid (12h)
              show_states: true
            graph_span: 12h
            yaxis:
              - min: 0
                max: 120
              - opposite: true
                min: 0
                max: 100
            series:
              - entity: input_number.grid_power_consumption
                name: Grid
                color: '#60a5fa'
              - entity: sensor.battery_level
                name: Battery %
                yaxis_id: 2
                color: '#34d399'
      - type: grid
        cards:
          - type: entities
            title: Energy Inputs
            entities:
              - input_number.solar_generation_kw
              - input_number.grid_power_consumption
              - input_number.battery_storage_pct
              - input_number.generator_fuel_level
          - type: entity-filter
            title: Power Alerts
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.low_water_storage
              - binary_sensor.storm_alert

  - title: Security
    path: security
    icon: mdi:shield-check
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: entities
            title: Security Controls
            entities:
              - switch.perimeter_alarm
              - switch.security_lights
              - switch.rain_sensors
              - input_boolean.gate_lock_main
              - input_boolean.gate_lock_secondary
          - type: entity-filter
            title: Active Security Events
            show_empty: false
            state_filter:
              - 'on'
            entities:
              - binary_sensor.motion_detected_barn
              - binary_sensor.motion_detected_equipment
              - binary_sensor.storm_alert
          - type: logbook
            title: Security Timeline (Last 6h)
            hours_to_show: 6

  - title: Agents
    path: agents
    icon: mdi:robot
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: markdown
            title: Agent Observatory
            content: |
              ### Live Action Feed
              Use this view to watch agent actions and their impact in real time.
          - type: logbook
            title: Full Agent + Device Timeline (Last 6h)
            hours_to_show: 6
          - type: history-graph
            title: Key Outcome Signals
            hours_to_show: 6
            entities:
              - binary_sensor.irrigation_active
              - binary_sensor.pumps_running
              - sensor.soil_moisture_north
              - sensor.soil_moisture_south
              - sensor.water_tank_total

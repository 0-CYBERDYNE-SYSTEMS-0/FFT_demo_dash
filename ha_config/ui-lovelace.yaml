                name: Cooling C
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: input_boolean.greenhouse_vent_b
                name: Vent B
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: input_boolean.greenhouse_vent_c
                name: Vent C
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: switch.barn_heater
                name: Barn Heater
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: switch.barn_fan

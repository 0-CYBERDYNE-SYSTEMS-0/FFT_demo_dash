title: FFT Licensed Cannabis Ops
theme: farm_ops_theater
views:
  - title: Executive Portfolio
    path: nexus
    icon: mdi:hexagon-multiple
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Executive Portfolio
              Licensed multi-site cannabis/hemp operations rollup with transfer pressure, production flow, and compliance posture.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: NOAA Radar
                icon: mdi:radar
                tap_action:
                  action: url
                  url_path: https://radar.weather.gov/
              - type: button
                name: GOES Live
                icon: mdi:satellite-variant
                tap_action:
                  action: url
                  url_path: https://www.ospo.noaa.gov/Products/imagery/goes.html
              - type: button
                name: Windy Map
                icon: mdi:map-search
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
              - type: button
                name: METRC Docs
                icon: mdi:file-document-check-outline
                tap_action:
                  action: url
                  url_path: https://www.metrc.com/resources/
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: input_select.cannabis_site_focus
                icon: mdi:map-marker-radius
                content_info: state
              - type: entity
                entity: input_select.cannabis_shift_mode
                icon: mdi:account-clock-outline
                content_info: state
              - type: entity
                entity: input_select.cannabis_security_posture
                icon: mdi:shield-account
                content_info: state
              - type: entity
                entity: input_select.incident_mode
                icon: mdi:alert-decagram
                content_info: state
              - type: entity
                entity: input_select.cannabis_scenario
                icon: mdi:state-machine
                content_info: state
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: sensor.audit_completeness_pct
                name: Audit Completeness
              - type: tile
                entity: sensor.qa_release_readiness
                name: QA Release Readiness
              - type: tile
                entity: sensor.transfer_queue_count
                name: Transfer Queue
              - type: tile
                entity: sensor.custody_break_risk
                name: Custody Break Risk
              - type: tile
                entity: sensor.cannabis_dispatch_health_idx
                name: Dispatch Health
              - type: tile
                entity: sensor.cannabis_schedule_risk_idx
                name: Schedule Risk
              - type: tile
                entity: sensor.cannabis_security_workload_idx
                name: Security Workload
              - type: tile
                entity: sensor.compliance_open_items
                name: Compliance Open Items
          - type: custom:bar-card
            title: Inventory Rollup
            width: 70%
            height: 24px
            direction: right
            entities:
              - entity: sensor.cannabis_total_dried_flower_lbs
                name: Dried Flower (lbs)
                min: 0
                max: 200000
              - entity: sensor.cannabis_total_extract_liters
                name: Extract (L)
                min: 0
                max: 50000
              - entity: sensor.cannabis_total_packaged_units
                name: Packaged Units
                min: 0
                max: 2000000
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Enterprise Pressure (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.cannabis_schedule_risk_idx
                name: Schedule Risk
                color: '#ff8b7a'
              - entity: sensor.cannabis_security_workload_idx
                name: Security Workload
                color: '#ffc857'
              - entity: sensor.cannabis_dispatch_health_idx
                name: Dispatch Health
                color: '#4ad7b8'
              - entity: sensor.custody_break_risk
                name: Custody Risk
                color: '#d18cff'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Production Throughput (6h)
              show_states: true
            graph_span: 6h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            series:
              - entity: sensor.cannabis_packaging_throughput_units_hr
                name: Packaging Units/hr
                type: column
                color: '#4cc9f0'
              - entity: sensor.cannabis_extraction_queue_count
                name: Extraction Queue
                type: line
                color: '#f4a261'
              - entity: sensor.cannabis_line_uptime_pct
                name: Line Uptime
                type: line
                color: '#70e000'
          - type: entities
            title: Chain-of-Custody Snapshot
            show_header_toggle: false
            entities:
              - entity: input_text.metrc_manifest_id
                name: Latest Manifest
              - entity: input_text.metrc_last_package_tag
                name: Latest Package Tag
              - entity: input_text.metrc_last_plant_batch_tag
                name: Latest Plant Batch Tag
              - entity: input_text.metrc_last_coa_id
                name: Latest COA
              - entity: input_text.cannabis_manifest_live_id
                name: Active Dispatch Manifest
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Portfolio Cameras
              Deterministic camera panels for demo stability.
          - type: picture-glance
            title: North Gate Live
            image: /local/cams/cam-north-yard.svg
            entities:
              - entity: sensor.cannabis_camera_health_pct
              - entity: sensor.cannabis_camera_alert_count
          - type: picture-glance
            title: Flower Room Live
            image: /local/cams/cam-greenhouse.svg
            entities:
              - entity: sensor.cannabis_air_temp_f
              - entity: sensor.cannabis_rh_pct
          - type: picture-glance
            title: Processing Dock Live
            image: /local/cams/cam-equipment.svg
            entities:
              - entity: input_boolean.cannabis_transport_delay
              - entity: sensor.cannabis_transfer_eta_min

  - title: Regulatory War Room
    path: war-room
    icon: mdi:shield-alert
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Regulatory War Room
              Incident response, escalation, and chain-of-custody remediation controls.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: NWS Alerts
                icon: mdi:alarm-light
                tap_action:
                  action: url
                  url_path: https://www.weather.gov/alerts
              - type: button
                name: SPC Outlook
                icon: mdi:weather-lightning
                tap_action:
                  action: url
                  url_path: https://www.spc.noaa.gov/products/outlook/
              - type: button
                name: NOAA NowCOAST
                icon: mdi:earth
                tap_action:
                  action: url
                  url_path: https://nowcoast.noaa.gov/
              - type: button
                name: METRC Support
                icon: mdi:lifebuoy
                tap_action:
                  action: url
                  url_path: https://www.metrc.com/support/
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: input_select.incident_mode
              - type: entity
                entity: binary_sensor.cannabis_security_escalation_required
                icon: mdi:alarm-light-outline
                content_info: state
              - type: entity
                entity: binary_sensor.cannabis_coverage_gap
                icon: mdi:map-marker-off-outline
                content_info: state
              - type: entity
                entity: binary_sensor.cannabis_dispatch_health_critical
                icon: mdi:truck-alert-outline
                content_info: state
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Incident Storm
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Incident Intrusion
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Incident Power
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Incident Clear
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
          - type: entities
            title: Escalation Controls
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_security_posture
              - entity: input_boolean.cannabis_site_a_perimeter_lockdown
              - entity: input_boolean.cannabis_site_a_vault_lock
              - entity: input_boolean.cannabis_security_intrusion
              - entity: input_boolean.cannabis_vault_exception_active
              - entity: input_boolean.cannabis_badge_system_degraded
              - entity: input_boolean.cannabis_transport_delay
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Incident Timeline (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 300
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 1
            series:
              - entity: input_boolean.cannabis_security_intrusion
                name: Intrusion
                type: column
                color: '#ff595e'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_site_a_perimeter_lockdown
                name: Lockdown
                type: column
                color: '#ffca3a'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_transport_delay
                name: Delay
                type: column
                color: '#1982c4'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.qa_hold_active
                name: QA Hold
                type: line
                color: '#6a4c93'
                transform: "return x === 'on' ? 1 : 0;"
          - type: logbook
            title: Event Logbook
            entities:
              - input_boolean.cannabis_security_intrusion
              - input_boolean.cannabis_site_a_perimeter_lockdown
              - input_boolean.cannabis_vault_exception_active
              - input_boolean.cannabis_transport_delay
              - input_boolean.qa_hold_active
              - input_select.incident_mode
            hours_to_show: 8
      - type: grid
        cards:
          - type: entities
            title: Regulatory Action Stack
            show_header_toggle: false
            entities:
              - entity: sensor.compliance_open_items
              - entity: sensor.audit_completeness_pct
              - entity: sensor.metrc_sync_health
              - entity: sensor.transfer_queue_count
              - entity: sensor.custody_break_risk
              - entity: input_select.transfer_status
          - type: gauge
            entity: sensor.cannabis_dispatch_health_idx
            name: Dispatch Health
            min: 0
            max: 100
            severity:
              green: 70
              yellow: 45
              red: 0
          - type: gauge
            entity: sensor.cannabis_security_workload_idx
            name: Security Workload
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 45
              red: 70

  - title: Site Operations Chamber
    path: command-center
    icon: mdi:cannabis
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Incident + Controls Chamber
              Primary operator controls for cultivation, utilities, security, and workforce.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Radar Wall
                icon: mdi:radar
                tap_action:
                  action: url
                  url_path: https://radar.weather.gov/
              - type: button
                name: Regional Map
                icon: mdi:map-marker-multiple
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
              - type: button
                name: Transport Layer
                icon: mdi:truck-fast-outline
                tap_action:
                  action: url
                  url_path: https://www.weather.gov/srh/nwspage
              - type: button
                name: Dispatch Intel
                icon: mdi:open-in-new
                tap_action:
                  action: url
                  url_path: https://nowcoast.noaa.gov/
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: input_select.incident_mode
                icon: mdi:alert-circle
              - type: entity
                entity: input_select.cannabis_env_recipe
                icon: mdi:leaf-circle-outline
              - type: entity
                entity: input_select.cannabis_control_profile
                icon: mdi:tune
              - type: entity
                entity: input_select.cannabis_shift_mode
                icon: mdi:account-clock
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Storm
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Intrusion
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Power Failure
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Clear
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
          - type: markdown
            content: |
              ### Cultivation Controls
          - type: grid
            columns: 3
            square: false
            cards:
              - type: tile
                entity: input_boolean.cannabis_site_a_zone_veg_irrigation
                name: Site A Veg Irrigation
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_zone_flower_irrigation
                name: Site A Flower Irrigation
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_b_greenhouse_irrigation
                name: Site B Irrigation
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_c_hemp_block_irrigation
                name: Site C Irrigation
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_hvac_enable
                name: HVAC Enable
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_dehu_enable
                name: Dehu Enable
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_co2_inject_enable
                name: CO2 Injection
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_fertigation_enable
                name: Fertigation Enable
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_processing_line_enable
                name: Processing Enable
                tap_action:
                  action: toggle
          - type: markdown
            content: |
              ### Security + Workforce Controls
          - type: grid
            columns: 3
            square: false
            cards:
              - type: tile
                entity: input_boolean.cannabis_site_a_perimeter_lockdown
                name: Perimeter Lockdown
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_vault_lock
                name: Vault Lock
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_site_a_camera_ptz_patrol
                name: Camera PTZ Patrol
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_security_intrusion
                name: Intrusion Signal
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_staff_shortage_alert
                name: Staff Shortage
                tap_action:
                  action: toggle
              - type: tile
                entity: input_boolean.cannabis_schedule_disruption_active
                name: Schedule Disruption
                tap_action:
                  action: toggle
          - type: entities
            title: Active Operation Stack
            show_header_toggle: false
            entities:
              - entity: sensor.cannabis_staff_on_shift_total
              - entity: sensor.cannabis_work_orders_open
              - entity: sensor.cannabis_work_orders_overdue
              - entity: sensor.cannabis_schedule_adherence_pct
              - entity: input_text.cannabis_shift_supervisor
              - entity: input_text.cannabis_next_critical_task
      - type: grid
        cards:
          - type: markdown
            content: |
              # Live Analytics Chamber
              Environmental, irrigation/fertigation, and execution telemetry.
          - type: custom:apexcharts-card
            header:
              show: true
              title: Environment Model (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 290
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - id: env
                min: 0
                max: 100
              - id: co2
                opposite: true
                min: 300
                max: 1600
            series:
              - entity: sensor.cannabis_air_temp_f
                name: Air Temp F
                yaxis_id: env
                color: '#ff9f1c'
              - entity: sensor.cannabis_leaf_temp_f
                name: Leaf Temp F
                yaxis_id: env
                color: '#ffbf69'
              - entity: sensor.cannabis_rh_pct
                name: RH %
                yaxis_id: env
                color: '#2ec4b6'
              - entity: sensor.cannabis_env_vpd_kpa
                name: VPD kPa
                yaxis_id: env
                color: '#9d4edd'
              - entity: sensor.cannabis_co2_ppm
                name: CO2 ppm
                yaxis_id: co2
                color: '#4cc9f0'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Irrigation + Fertigation Pulse (6h)
              show_states: true
            graph_span: 6h
            apex_config:
              chart:
                height: 290
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - id: chem
                min: 0
                max: 8
              - id: dose
                opposite: true
                min: 0
                max: 320
            series:
              - entity: sensor.cannabis_ec_in
                name: EC In
                yaxis_id: chem
                color: '#00b4d8'
              - entity: sensor.cannabis_ph_in
                name: pH In
                yaxis_id: chem
                color: '#90be6d'
              - entity: sensor.cannabis_runoff_ec
                name: Runoff EC
                yaxis_id: chem
                color: '#f8961e'
              - entity: sensor.cannabis_runoff_ph
                name: Runoff pH
                yaxis_id: chem
                color: '#f3722c'
              - entity: sensor.cannabis_dose_rate_ml_min
                name: Dose Rate
                yaxis_id: dose
                color: '#f9c74f'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Workforce + Work Orders (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 290
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 180
            series:
              - entity: sensor.cannabis_staff_on_shift_total
                name: Staff On Shift
                type: line
                color: '#43aa8b'
              - entity: sensor.cannabis_work_orders_open
                name: Work Orders Open
                type: column
                color: '#577590'
              - entity: sensor.cannabis_work_orders_overdue
                name: Work Orders Overdue
                type: column
                color: '#f94144'
              - entity: sensor.cannabis_schedule_adherence_pct
                name: Schedule Adherence
                type: line
                color: '#277da1'
      - type: grid
        cards:
          - type: markdown
            content: |
              # Compliance + Cameras Chamber
              Compliance status, camera health, and drone mission operations.
          - type: entities
            title: Compliance + Transfers
            show_header_toggle: false
            entities:
              - entity: sensor.compliance_open_items
              - entity: sensor.audit_completeness_pct
              - entity: sensor.metrc_sync_health
              - entity: sensor.transfer_queue_count
              - entity: input_select.transfer_status
              - entity: sensor.custody_break_risk
              - entity: input_text.metrc_manifest_id
          - type: entities
            title: Camera + Drone Status
            show_header_toggle: false
            entities:
              - entity: sensor.cannabis_camera_health_pct
              - entity: sensor.cannabis_camera_alert_count
              - entity: input_select.cannabis_drone_mission_state
              - entity: sensor.cannabis_drone_progress_pct
              - entity: sensor.cannabis_drone_battery_pct
              - entity: sensor.cannabis_drone_anomaly_score
              - entity: binary_sensor.cannabis_drone_geofence_breach_active
          - type: picture-glance
            title: North Gate
            image: /local/cams/cam-north-yard.svg
            entities:
              - entity: sensor.cannabis_camera_health_pct
              - entity: input_boolean.cannabis_site_a_perimeter_lockdown
          - type: picture-glance
            title: Flower Room
            image: /local/cams/cam-greenhouse.svg
            entities:
              - entity: sensor.cannabis_air_temp_f
              - entity: sensor.cannabis_rh_pct
          - type: picture-glance
            title: Packaging Dock
            image: /local/cams/cam-equipment.svg
            entities:
              - entity: sensor.cannabis_packaging_throughput_units_hr
              - entity: sensor.cannabis_transfer_eta_min
          - type: todo-list
            entity: todo.shopping_list
            title: Shift Execution Checklist

  - title: Cultivation
    path: irrigation
    icon: mdi:sprinkler
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Cultivation Irrigation + Nutrient Delivery
              Zone orchestration for indoor flower, greenhouse, and outdoor hemp blocks.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: VPD Guide
                icon: mdi:thermometer-water
                tap_action:
                  action: url
                  url_path: https://www.umass.edu/agriculture-food-environment/greenhouse-floriculture/fact-sheets/vapor-pressure-deficit-vpd-and-greenhouse-production
              - type: button
                name: DLI Ref
                icon: mdi:white-balance-sunny
                tap_action:
                  action: url
                  url_path: https://fluence-led.com/horticulture-lighting-knowledge/what-is-dli/
              - type: button
                name: Irrigation Intel
                icon: mdi:water-sync
                tap_action:
                  action: url
                  url_path: https://www.epa.gov/waterdata
              - type: button
                name: Crop Risk Map
                icon: mdi:map-outline
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
          - type: entities
            title: Irrigation Controls
            show_header_toggle: false
            entities:
              - entity: input_boolean.cannabis_site_a_zone_veg_irrigation
              - entity: input_boolean.cannabis_site_a_zone_flower_irrigation
              - entity: input_boolean.cannabis_site_b_greenhouse_irrigation
              - entity: input_boolean.cannabis_site_c_hemp_block_irrigation
              - entity: input_number.cannabis_irrigation_zone_a_cycles
              - entity: input_number.cannabis_irrigation_zone_b_cycles
          - type: entities
            title: Fertigation Controls
            show_header_toggle: false
            entities:
              - entity: input_boolean.cannabis_site_a_fertigation_enable
              - entity: input_number.cannabis_fertigation_ec_in
              - entity: input_number.cannabis_fertigation_ph_in
              - entity: input_number.cannabis_fertigation_dose_ml_min
              - entity: input_number.cannabis_runoff_ec
              - entity: input_number.cannabis_runoff_ph
      - type: grid
        cards:

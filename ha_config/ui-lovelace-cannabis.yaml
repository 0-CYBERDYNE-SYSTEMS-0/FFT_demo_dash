                name: Battery %
                min: 0
                max: 100
                color: '#31d6a1'
              - entity: sensor.cannabis_drone_progress_pct
                name: Mission %
                min: 0
                max: 100
                color: '#56bcff'
              - entity: sensor.cannabis_drone_anomaly_score
                name: Anomaly %
                min: 0
                max: 100
                color: '#ff6f7a'
          - type: custom:mini-graph-card
            name: Drone Telemetry (4h)

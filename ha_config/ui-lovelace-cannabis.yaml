              - entity: input_number.cannabis_dispensary_staff_floor
                name: Staff on Floor
              - entity: input_number.cannabis_dispensary_compliance_holds
                name: Compliance Holds

      # --- Section 3: Sales Trends & Compliance ---
      - type: grid
        title: Sales Trends
        columns: 1

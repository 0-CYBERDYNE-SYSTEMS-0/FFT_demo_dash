            entities:
              - entity: input_boolean.cannabis_ipm_scouting_due_room_a
                name: Scout Room A
                tap_action:
                  action: toggle
              - entity: input_boolean.cannabis_ipm_scouting_due_room_b
                name: Scout Room B
                tap_action:
                  action: toggle
              - entity: input_boolean.cannabis_ipm_scouting_due_room_c
                name: Scout Room C
                tap_action:
                  action: toggle
              - entity: input_boolean.cannabis_ipm_scouting_due_room_d
                name: Scout Room D
                tap_action:
                  action: toggle
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Storm SOP
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Intrusion SOP
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Utility SOP
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Reset SOP
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
      - type: grid
        cards:

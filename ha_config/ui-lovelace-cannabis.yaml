            styles:
              card:
                - border-radius: 14px
                - overflow: hidden
                - height: 148px
                - background: |
                    [[[
                      const s = states['input_select.cannabis_drone_mission_state'].state;
                      if (s === 'Survey') return 'linear-gradient(135deg, rgba(4,28,20,1) 0%, rgba(6,46,30,1) 50%, rgba(2,18,12,1) 100%)';
                      if (s === 'Preflight') return 'linear-gradient(135deg, rgba(28,24,4,1) 0%, rgba(48,40,6,1) 50%, rgba(18,14,2,1) 100%)';
                      if (s === 'Return') return 'linear-gradient(135deg, rgba(28,14,4,1) 0%, rgba(48,26,6,1) 50%, rgba(18,8,2,1) 100%)';
                      if (s === 'Abort') return 'linear-gradient(135deg, rgba(32,4,8,1) 0%, rgba(56,8,18,1) 50%, rgba(20,2,6,1) 100%)';
                      return 'linear-gradient(135deg, rgba(4,12,28,1) 0%, rgba(8,20,44,1) 50%, rgba(2,8,18,1) 100%)';
                    ]]]
                - border: |
                    [[[
                      const s = states['input_select.cannabis_drone_mission_state'].state;
                      if (s === 'Survey') return '2px solid rgba(64,220,150,0.82)';
                      if (s === 'Preflight') return '2px solid rgba(255,198,60,0.82)';
                      if (s === 'Return') return '2px solid rgba(255,140,40,0.82)';
                      if (s === 'Abort') return '2px solid rgba(255,70,85,0.92)';
                      return '1px solid rgba(86,160,220,0.32)';
                    ]]]
                - box-shadow: |
                    [[[
                      const s = states['input_select.cannabis_drone_mission_state'].state;
                      if (s === 'Survey') return '0 0 44px rgba(64,220,150,0.48), 0 8px 32px rgba(4,16,12,0.90)';
                      if (s === 'Preflight') return '0 0 44px rgba(255,198,60,0.48), 0 8px 32px rgba(20,16,4,0.90)';
                      if (s === 'Return') return '0 0 44px rgba(255,140,40,0.48), 0 8px 32px rgba(20,10,4,0.90)';
                      if (s === 'Abort') return '0 0 56px rgba(255,70,85,0.68), 0 8px 32px rgba(24,4,8,0.92)';
                      return '0 8px 32px rgba(4,12,28,0.92)';
                    ]]]
              icon:
                - width: 64px
                - height: 64px
                - color: |
                    [[[
                      const s = states['input_select.cannabis_drone_mission_state'].state;
                      if (s === 'Survey') return 'rgba(64,220,150,0.92)';
                      if (s === 'Preflight') return 'rgba(255,198,60,0.92)';
                      if (s === 'Return') return 'rgba(255,140,40,0.92)';
                      if (s === 'Abort') return 'rgba(255,70,85,0.92)';
                      return 'rgba(86,160,220,0.70)';
                    ]]]
                - filter: |
                    [[[
                      const s = states['input_select.cannabis_drone_mission_state'].state;
                      if (s === 'Survey') return 'drop-shadow(0 0 16px rgba(64,220,150,0.72))';
                      if (s === 'Preflight') return 'drop-shadow(0 0 16px rgba(255,198,60,0.72))';
                      if (s === 'Return') return 'drop-shadow(0 0 16px rgba(255,140,40,0.72))';
                      if (s === 'Abort') return 'drop-shadow(0 0 20px rgba(255,70,85,0.80))';
                      return 'drop-shadow(0 0 12px rgba(86,160,220,0.50))';
                    ]]]
          - type: grid
            columns: 3
            square: false
            cards:
              - type: tile
                entity: sensor.cannabis_drone_battery_pct
                name: Battery
                icon: mdi:battery-medium
              - type: tile
                entity: sensor.cannabis_drone_progress_pct
                name: Progress
                icon: mdi:progress-check
              - type: tile
                entity: binary_sensor.cannabis_drone_geofence_breach_active

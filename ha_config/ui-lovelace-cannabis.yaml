  ##############################################################
  # VIEW 11: IPM HUB
  ##############################################################
  - title: IPM Hub
    path: ipm
    icon: mdi:bug-outline
    type: sections
    max_columns: 3
    dense_section_placement: true
    theme: cannabis_ops_theater
    sections:

      # --- Section 1: Pest Pressure Status ---
      - type: grid
        title: Pest Pressure Monitoring
        columns: 2
        cards:
          - type: tile
            entity: sensor.cannabis_ipm_overall_pressure_idx
            name: Overall Pressure Index
          - type: custom:bar-card
            title: Pest Pressure by Room (0–10)
            entities:
              - entity: input_number.cannabis_ipm_pest_pressure_room_a
                name: Room A
                max: 10
              - entity: input_number.cannabis_ipm_pest_pressure_room_b
                name: Room B
                max: 10
              - entity: input_number.cannabis_ipm_pest_pressure_room_c
                name: Room C
                max: 10
              - entity: input_number.cannabis_ipm_pest_pressure_room_d
                name: Room D
                max: 10
            severity:
              - value: 6
                color: '#e74c3c'
              - value: 3
                color: '#f39c12'
              - value: 0
                color: '#2ecc71'

      # --- Section 1b: Scouting Tasks ---
      - type: grid
        title: Scouting Due Tasks
        columns: 2
        cards:
          - type: tile
            entity: input_boolean.cannabis_ipm_scouting_due_room_a
            name: Room A Scouting Due
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.cannabis_ipm_scouting_due_room_b
            name: Room B Scouting Due
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.cannabis_ipm_scouting_due_room_c
            name: Room C Scouting Due
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.cannabis_ipm_scouting_due_room_d
            name: Room D Scouting Due
            tap_action:
              action: toggle

      # --- Section 2: Spray Blackout & Controls ---
      - type: grid
        title: Spray Blackout & Controls
        columns: 1
        cards:
          - type: conditional
            conditions:
              - entity: binary_sensor.cannabis_ipm_spray_blackout_active
                state: "on"
            card:
              type: custom:button-card
              name: "⚠ SPRAY BLACKOUT ACTIVE"
              label: One or more rooms in Flower Day 10+ — no spray permitted
              styles:
                card:
                  - background: '#4a0000'
                  - border: '2px solid #e74c3c'
                name:
                  - color: '#ff6b6b'
                  - font-size: 16px
                  - font-weight: bold
                label:
                  - color: '#ffaaaa'
                  - font-size: 12px

          - type: entities
            title: Last Spray Products & Days Since Spray
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_ipm_last_spray_product_room_a
                name: Room A Product
              - entity: input_number.cannabis_ipm_days_since_spray_room_a
                name: Room A Days Since Spray
              - type: divider
              - entity: input_select.cannabis_ipm_last_spray_product_room_b
                name: Room B Product
              - entity: input_number.cannabis_ipm_days_since_spray_room_b
                name: Room B Days Since Spray
              - type: divider
              - entity: input_select.cannabis_ipm_last_spray_product_room_c
                name: Room C Product
              - entity: input_number.cannabis_ipm_days_since_spray_room_c
                name: Room C Days Since Spray
              - type: divider
              - entity: input_select.cannabis_ipm_last_spray_product_room_d
                name: Room D Product
              - entity: input_number.cannabis_ipm_days_since_spray_room_d
                name: Room D Days Since Spray

          - type: entities
            title: Zone Quarantine Controls
            show_header_toggle: false
            entities:
              - entity: input_boolean.cannabis_ipm_zone_a_quarantine
                name: Room A Quarantine
              - entity: input_boolean.cannabis_ipm_zone_b_quarantine
                name: Room B Quarantine
              - entity: input_boolean.cannabis_ipm_zone_c_quarantine
                name: Room C Quarantine
              - entity: input_boolean.cannabis_ipm_zone_d_quarantine
                name: Room D Quarantine

      # --- Section 3: IPM Trends ---
      - type: grid
        title: IPM Trends
        columns: 1
        cards:
          - type: custom:mini-graph-card
            title: Pest Pressure Trend (14-day)
            entities:
              - entity: input_number.cannabis_ipm_pest_pressure_room_a
                name: Room A
              - entity: input_number.cannabis_ipm_pest_pressure_room_b
                name: Room B
              - entity: input_number.cannabis_ipm_pest_pressure_room_c
                name: Room C
              - entity: input_number.cannabis_ipm_pest_pressure_room_d
                name: Room D
            hours_to_show: 336
            points_per_hour: 1
            line_width: 2
            show:
              labels: true
              points: false

          - type: logbook
            title: IPM Events (12h)
            hours_to_show: 12
            entities:
              - input_boolean.cannabis_ipm_scouting_due_room_a
              - input_boolean.cannabis_ipm_scouting_due_room_b
              - input_boolean.cannabis_ipm_scouting_due_room_c
              - input_boolean.cannabis_ipm_scouting_due_room_d
              - input_boolean.cannabis_ipm_zone_a_quarantine
              - input_boolean.cannabis_ipm_zone_b_quarantine
              - input_boolean.cannabis_ipm_zone_c_quarantine
              - input_boolean.cannabis_ipm_zone_d_quarantine
              - binary_sensor.cannabis_ipm_spray_blackout_active

  ##############################################################
  # VIEW 12: EXTRACTION LAB
  ##############################################################
  - title: Extraction Lab
    path: lab
    icon: mdi:flask-outline
    type: sections
    max_columns: 3
    dense_section_placement: true
    theme: cannabis_ops_theater
    sections:

      # --- Section 1: Safety Status ---
      - type: grid
        title: Safety Status & Controls
        columns: 2
        cards:
          - type: tile
            entity: input_boolean.cannabis_lab_safety_interlock_ok
            name: Safety Interlock
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.cannabis_lab_ppe_compliance_active
            name: PPE Compliance
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.cannabis_lab_solvent_alarm
            name: Solvent Alarm
            tap_action:
              action: toggle
          - type: tile
            entity: sensor.cannabis_lab_safety_idx
            name: Safety Index

          - type: gauge
            entity: input_number.cannabis_lab_room_temp_f
            name: Lab Temp (°F)
            min: 50
            max: 85
            severity:
              green: 60
              yellow: 78
              red: 82

          - type: gauge
            entity: input_number.cannabis_lab_room_rh_pct
            name: Lab RH %
            min: 10
            max: 60
            severity:
              green: 20
              yellow: 50
              red: 58

          - type: gauge
            entity: input_number.cannabis_lab_ventilation_pct
            name: Ventilation %
            min: 0
            max: 100
            severity:
              green: 75
              yellow: 50
              red: 0

      # --- Section 2: Batch Operations ---
      - type: grid
        title: Batch Operations
        columns: 1
        cards:
          - type: entities
            title: Extraction Controls
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_lab_extraction_method
                name: Extraction Method
              - entity: input_select.cannabis_lab_current_product_type
                name: Product Type
              - entity: input_boolean.cannabis_lab_extraction_active
                name: Extraction Active

          - type: tile
            entity: input_number.cannabis_lab_active_batch_duration_hrs
            name: Active Batch Duration (hrs)

          - type: custom:bar-card
            title: Lab Efficiency
            entities:
              - entity: input_number.cannabis_lab_extraction_yield_pct
                name: Extraction Yield %
                max: 100
              - entity: input_number.cannabis_lab_solvent_recovery_pct
                name: Solvent Recovery %
                max: 100

          - type: entities
            title: Batch Queue
            show_header_toggle: false
            entities:
              - entity: input_number.cannabis_lab_batch_queue_count
                name: Batch Queue Count
              - entity: input_number.cannabis_lab_weekly_throughput_lbs_biomass
                name: Weekly Biomass (lbs)

      # --- Section 3: Extract Inventory & Analytics ---
      - type: grid
        title: Extract Inventory
        columns: 1
        cards:
          - type: custom:bar-card
            title: Inventory by Extract Type
            entities:
              - entity: input_number.cannabis_lab_crude_oil_lbs
                name: Crude Oil (lbs)
                max: 100
              - entity: input_number.cannabis_lab_distillate_liters
                name: Distillate (L)
                max: 50
              - entity: input_number.cannabis_lab_isolate_kg
                name: Isolate (kg)
                max: 10
              - entity: input_number.cannabis_lab_rosin_grams
                name: Rosin (g)
                max: 2000

          - type: custom:mini-graph-card
            title: Yield % & Solvent Recovery (24h)
            entities:
              - entity: input_number.cannabis_lab_extraction_yield_pct
                name: Yield %
              - entity: input_number.cannabis_lab_solvent_recovery_pct
                name: Solvent Recovery %
            hours_to_show: 24
            line_width: 2
            show:
              labels: true

          - type: logbook
            title: Lab Events (24h)
            hours_to_show: 24
            entities:
              - input_boolean.cannabis_lab_extraction_active
              - input_boolean.cannabis_lab_solvent_alarm
              - input_boolean.cannabis_lab_safety_interlock_ok


  - title: Automation
    path: agents
    icon: mdi:robot
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Automation
              SOP automation, work orders, shift execution, and incident scripts.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Ops Browser
                icon: mdi:web
                tap_action:
                  action: url
                  url_path: https://nowcoast.noaa.gov/
              - type: button
                name: Radar Feed
                icon: mdi:radar
                tap_action:
                  action: url
                  url_path: https://radar.weather.gov/
              - type: button
                name: Satellite Feed
                icon: mdi:satellite-uplink
                tap_action:
                  action: url
                  url_path: https://www.ospo.noaa.gov/Products/imagery/goes.html
              - type: button
                name: Wind Map
                icon: mdi:weather-windy
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
          - type: entities
            title: SOP Control Surface
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_control_profile
              - entity: input_select.cannabis_shift_mode
              - entity: input_select.cannabis_site_focus
              - entity: input_text.cannabis_shift_supervisor
              - entity: input_text.cannabis_next_critical_task
              - entity: input_text.cannabis_dispatch_channel_status
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Storm SOP
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Intrusion SOP
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Utility SOP
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Reset SOP
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Schedule Execution Loop (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 300
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 120
            series:
              - entity: sensor.cannabis_work_orders_open
                name: Open Work Orders
                type: column
                color: '#577590'
              - entity: sensor.cannabis_work_orders_overdue
                name: Overdue Work Orders
                type: column
                color: '#f94144'
              - entity: sensor.cannabis_schedule_adherence_pct
                name: Schedule Adherence
                type: line
                color: '#43aa8b'
              - entity: sensor.cannabis_staff_on_shift_total
                name: Staff On Shift
                type: line
                color: '#4cc9f0'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Alert Pulse (6h)
              show_states: true
            graph_span: 6h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 1
            series:
              - entity: input_boolean.cannabis_hvac_alarm
                name: HVAC Alarm
                type: line
                color: '#ff595e'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_dehu_alarm
                name: Dehu Alarm
                type: line
                color: '#ffca3a'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_fertigation_alarm
                name: Fertigation Alarm
                type: line
                color: '#8ac926'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_processing_line_fault
                name: Processing Fault
                type: line
                color: '#6a4c93'
                transform: "return x === 'on' ? 1 : 0;"
      - type: grid
        cards:
          - type: todo-list
            entity: todo.shopping_list
            title: Shift Task Queue
          - type: logbook
            title: Automation Event Log
            entities:
              - input_select.cannabis_control_profile
              - input_select.cannabis_shift_mode
              - input_boolean.cannabis_schedule_disruption_active
              - input_boolean.cannabis_staff_shortage_alert
              - input_boolean.cannabis_transport_delay
            hours_to_show: 12
          - type: entities
            title: Browser + Dispatch Stack
            show_header_toggle: false
            entities:
              - entity: input_text.cannabis_browser_ops_primary_url
              - entity: input_text.cannabis_browser_ops_secondary_url
              - entity: input_text.cannabis_manifest_live_id
              - entity: sensor.cannabis_dispatch_health_idx
              - entity: sensor.cannabis_transport_risk_idx

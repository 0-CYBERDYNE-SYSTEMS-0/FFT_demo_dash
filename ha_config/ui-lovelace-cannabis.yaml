title: FFT Licensed Cannabis Ops
views:
  - title: Executive Portfolio
    path: nexus
    theme: cannabis_ops_theater
    background: "linear-gradient(rgba(4,8,18,0.46), rgba(4,8,18,0.46)), url(https://images.unsplash.com/photo-1740776013253-77a97581acec?w=1920&q=60&auto=format&fit=crop) center/cover no-repeat fixed"
    icon: mdi:hexagon-multiple
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        column_span: 3
        cards:
          - type: custom:button-card
            entity: input_text.agent_commentary
            show_name: false
            show_icon: false
            show_label: true
            label: |
              [[[
                const commentary = entity.state;
                const status = states['input_text.agent_status']?.state ?? 'Monitoring';
                if (!commentary) return '';
                return `<div style="text-align:left;line-height:1.5"><strong style="font-size:1.05rem;color:#f1f7ff">${status}</strong><br><span style="color:#c2d2eb;font-size:0.97rem">${commentary}</span></div>`;
              ]]]
            styles:
              card:
                - display: "[[[ return entity.state ? 'block' : 'none'; ]]]"
                - height: "[[[ return entity.state ? 'auto' : '0px'; ]]]"
                - min-height: "0 !important"
                - padding: "[[[ return entity.state ? '16px 20px' : '0'; ]]]"
                - overflow: hidden
                - background: rgba(4, 10, 20, 0.97)
                - border: "[[[ return entity.state ? '1px solid rgba(46,238,192,0.3)' : 'none'; ]]]"
                - border-left: "[[[ return entity.state ? '4px solid #2eeec0' : 'none'; ]]]"
                - border-radius: 12px
                - box-shadow: "[[[ return entity.state ? '0 0 36px rgba(46,238,192,0.14)' : 'none'; ]]]"
                - animation: "[[[ return entity.state ? 'agent-pulse 2.5s ease-in-out infinite' : 'none'; ]]]"
              label:
                - padding: "0"
                - white-space: normal
                - text-align: left
            extra_styles: |
              @keyframes agent-pulse {
                0%, 100% { border-left-color: #2eeec0; box-shadow: 0 0 36px rgba(46,238,192,0.14); }
                50% { border-left-color: #5db7ff; box-shadow: 0 0 36px rgba(93,183,255,0.20); }
              }
      - type: grid
        cards:
          - type: picture-elements
            image: https://images.unsplash.com/photo-1740776013253-77a97581acec?w=1400&q=80&auto=format&fit=crop
            elements: []
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(64, 180, 110, 0.40);
                  border-radius: 16px;
                  overflow: hidden;
                  box-shadow: 0 16px 48px rgba(2, 12, 8, 0.90);
                }
          - type: markdown
            content: |
              # Executive Portfolio
              Licensed multi-site cannabis/hemp operations rollup with transfer pressure, production flow, and compliance posture.
          - type: vertical-stack
            cards:
              - type: custom:mini-graph-card
                name: Audit Completeness
                entities:
                  - sensor.audit_completeness_pct
                hours_to_show: 8
                points_per_hour: 2
                line_color: '#56bcff'
                show:
                  icon: false
                  fill: true
              - type: custom:mini-graph-card
                name: QA Release Readiness
                entities:
                  - sensor.qa_release_readiness
                hours_to_show: 8
                points_per_hour: 2
                line_color: '#30e7bf'
                show:
                  icon: false
                  fill: true
              - type: custom:mini-graph-card
                name: METRC Sync Health
                entities:
                  - sensor.metrc_sync_health
                hours_to_show: 8
                points_per_hour: 2
                line_color: '#a78bfa'
                show:
                  icon: false
                  fill: true
              - type: custom:mini-graph-card
                name: Dispatch Health
                entities:
                  - sensor.cannabis_dispatch_health_idx
                hours_to_show: 8
                points_per_hour: 2
                line_color: '#f59e0b'
                show:
                  icon: false
                  fill: true
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: NOAA Radar
                icon: mdi:radar
                tap_action:
                  action: url
                  url_path: https://radar.weather.gov/
              - type: button
                name: GOES Live
                icon: mdi:satellite-variant
                tap_action:
                  action: url
                  url_path: https://www.ospo.noaa.gov/Products/imagery/goes.html
              - type: button
                name: Windy Map
                icon: mdi:map-search
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
              - type: button
                name: METRC Docs
                icon: mdi:file-document-check-outline
                tap_action:
                  action: url
                  url_path: https://www.metrc.com/resources/
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: input_select.cannabis_active_facility
                icon: mdi:map-marker-multiple
                content_info: state
              - type: entity
                entity: input_select.cannabis_site_focus
                icon: mdi:map-marker-radius
                content_info: state
              - type: entity
                entity: input_select.cannabis_shift_mode
                icon: mdi:account-clock-outline
                content_info: state
              - type: entity
                entity: input_select.cannabis_security_posture
                icon: mdi:shield-account
                content_info: state
              - type: entity
                entity: input_select.incident_mode
                icon: mdi:alert-decagram
                content_info: state
              - type: entity
                entity: input_select.cannabis_scenario
                icon: mdi:state-machine
                content_info: state
          - type: heading
            heading: Compliance KPIs
            heading_style: title
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: sensor.audit_completeness_pct
                name: Audit Completeness
              - type: tile
                entity: sensor.qa_release_readiness
                name: QA Release Readiness
              - type: tile
                entity: sensor.transfer_queue_count
                name: Transfer Queue
              - type: tile
                entity: sensor.custody_break_risk
                name: Custody Break Risk
          - type: heading
            heading: Operations KPIs
            heading_style: title
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: sensor.cannabis_dispatch_health_idx
                name: Dispatch Health
              - type: tile
                entity: sensor.cannabis_schedule_risk_idx
                name: Schedule Risk
              - type: tile
                entity: sensor.cannabis_security_workload_idx
                name: Security Workload
              - type: tile
                entity: sensor.compliance_open_items
                name: Compliance Open Items
          - type: heading
            heading: Commercial KPIs
            heading_style: title
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: input_number.cannabis_dispensary_daily_sales_usd
                name: Dispensary Daily Sales ($)
              - type: tile
                entity: sensor.cannabis_lab_safety_idx
                name: Lab Safety Index
              - type: tile
                entity: sensor.cannabis_ipm_overall_pressure_idx
                name: IPM Pressure
              - type: tile
                entity: input_number.cannabis_financial_gross_margin_pct
                name: Gross Margin %
          - type: heading
            heading: Grow Room Status
            heading_style: title
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: input_select.cannabis_room_a_stage
                name: Room A Stage
              - type: tile
                entity: input_select.cannabis_room_b_stage
                name: Room B Stage
              - type: tile
                entity: input_select.cannabis_room_c_stage
                name: Room C Stage
              - type: tile
                entity: input_select.cannabis_room_d_stage
                name: Room D Stage
          - type: custom:bar-card
            title: Inventory Rollup
            width: 70%
            height: 24px
            direction: right
            entities:
              - entity: sensor.cannabis_total_dried_flower_lbs
                name: Dried Flower (lbs)
                min: 0
                max: 200000
              - entity: sensor.cannabis_total_extract_liters
                name: Extract (L)
                min: 0
                max: 50000
              - entity: sensor.cannabis_total_packaged_units
                name: Packaged Units
                min: 0
                max: 2000000
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Enterprise Pressure (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.cannabis_schedule_risk_idx
                name: Schedule Risk
                color: '#ff8b7a'
              - entity: sensor.cannabis_security_workload_idx
                name: Security Workload
                color: '#ffc857'
              - entity: sensor.cannabis_dispatch_health_idx
                name: Dispatch Health
                color: '#4ad7b8'
              - entity: sensor.custody_break_risk
                name: Custody Risk
                color: '#d18cff'
          - type: custom:apexcharts-card
            header:
              show: true
              title: Production Throughput (6h)
              show_states: true
            graph_span: 6h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            series:
              - entity: sensor.cannabis_packaging_throughput_units_hr
                name: Packaging Units/hr
                type: column
                color: '#4cc9f0'
              - entity: sensor.cannabis_extraction_queue_count
                name: Extraction Queue
                type: line
                color: '#f4a261'
              - entity: sensor.cannabis_line_uptime_pct
                name: Line Uptime
                type: line
                color: '#70e000'
          - type: entities
            title: Chain-of-Custody Snapshot
            show_header_toggle: false
            entities:
              - entity: input_text.metrc_manifest_id
                name: Latest Manifest
              - entity: input_text.metrc_last_package_tag
                name: Latest Package Tag
              - entity: input_text.metrc_last_plant_batch_tag
                name: Latest Plant Batch Tag
              - entity: input_text.metrc_last_coa_id
                name: Latest COA
              - entity: input_text.cannabis_manifest_live_id
                name: Active Dispatch Manifest
      - type: grid
        cards:
          - type: markdown
            content: |
              ## Portfolio Cameras
              Deterministic camera panels for demo stability.
          - type: picture-glance
            title: North Gate Live
            image: /local/cams/cam-north-yard.svg
            entities:
              - entity: sensor.cannabis_camera_health_pct
              - entity: sensor.cannabis_camera_alert_count
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(40, 220, 130, 0.48);
                  border-radius: 14px;
                  overflow: hidden;
                  box-shadow: 0 0 20px rgba(40,220,130,0.12), 0 10px 28px rgba(2,14,10,0.88);
                }
          - type: picture-glance
            title: Flower Room Live
            image: /local/cams/cam-greenhouse.svg
            entities:
              - entity: sensor.cannabis_air_temp_f
              - entity: sensor.cannabis_rh_pct
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(40, 220, 130, 0.48);
                  border-radius: 14px;
                  overflow: hidden;
                  box-shadow: 0 0 20px rgba(40,220,130,0.12), 0 10px 28px rgba(2,14,10,0.88);
                }
          - type: picture-glance
            title: Processing Dock Live
            image: /local/cams/cam-equipment.svg
            entities:
              - entity: input_boolean.cannabis_transport_delay
              - entity: sensor.cannabis_transfer_eta_min
            card_mod:
              style: |
                ha-card {
                  border: 1px solid rgba(40, 220, 130, 0.48);
                  border-radius: 14px;
                  overflow: hidden;
                  box-shadow: 0 0 20px rgba(40,220,130,0.12), 0 10px 28px rgba(2,14,10,0.88);
                }

  - title: Regulatory War Room
    path: war-room
    theme: cannabis_ops_theater
    background: "linear-gradient(rgba(4,8,18,0.46), rgba(4,8,18,0.46)), url(https://images.unsplash.com/photo-1740776013253-77a97581acec?w=1920&q=60&auto=format&fit=crop) center/cover no-repeat fixed"
    icon: mdi:shield-alert
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: custom:button-card
            show_name: false
            show_icon: false
            show_state: false
            styles:
              card:
                - background: linear-gradient(135deg, rgba(38,4,10,1) 0%, rgba(75,6,22,1) 40%, rgba(14,4,32,1) 75%, rgba(8,4,28,1) 100%)
                - height: 112px
                - border-radius: 16px
                - border: 1px solid rgba(255, 75, 100, 0.38)
                - box-shadow: "0 0 70px rgba(255,38,65,0.14), 0 18px 42px rgba(14,4,22,0.92)"
                - overflow: hidden
                - position: relative
            card_mod:
              style: |
                ha-card::before {
                  content: 'REGULATORY WAR ROOM';
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  font-size: 1.15rem;
                  font-weight: 900;
                  letter-spacing: 0.24em;
                  color: rgba(255, 140, 165, 0.92);
                  text-shadow: 0 0 32px rgba(255,55,80,0.60), 0 2px 10px rgba(0,0,0,0.90);
                  pointer-events: none;
                  z-index: 1;
                  white-space: nowrap;
                }
                ha-card::after {
                  content: '';
                  position: absolute;
                  inset: 0;
                  background: radial-gradient(ellipse at 50% 55%, rgba(255,45,70,0.12) 0%, transparent 62%);
                  pointer-events: none;
                  z-index: 0;
                }
          - type: custom:apexcharts-card
            header:
              show: true
              title: Regulatory Pressure Stack (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - id: counts
                min: 0
                max: 40
              - id: pct
                opposite: true
                min: 0
                max: 100
            series:
              - entity: sensor.compliance_open_items
                name: Compliance Open
                type: column
                yaxis_id: counts
                color: '#ff6f7a'
              - entity: sensor.transfer_queue_count
                name: Transfer Queue
                type: column
                yaxis_id: counts
                color: '#ffb85c'
              - entity: sensor.custody_break_risk
                name: Custody Risk
                type: line
                yaxis_id: pct
                color: '#d18cff'
              - entity: sensor.cannabis_security_workload_idx
                name: Security Workload
                type: line
                yaxis_id: pct
                color: '#56bcff'
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: NWS Alerts
                icon: mdi:alarm-light
                tap_action:
                  action: url
                  url_path: https://www.weather.gov/alerts
              - type: button
                name: SPC Outlook
                icon: mdi:weather-lightning
                tap_action:
                  action: url
                  url_path: https://www.spc.noaa.gov/products/outlook/
              - type: button
                name: NOAA NowCOAST
                icon: mdi:earth
                tap_action:
                  action: url
                  url_path: https://nowcoast.noaa.gov/
              - type: button
                name: METRC Support
                icon: mdi:lifebuoy
                tap_action:
                  action: url
                  url_path: https://www.metrc.com/support/
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: input_select.incident_mode
              - type: entity
                entity: binary_sensor.cannabis_security_escalation_required
                icon: mdi:alarm-light-outline
                content_info: state
              - type: entity
                entity: binary_sensor.cannabis_coverage_gap
                icon: mdi:map-marker-off-outline
                content_info: state
              - type: entity
                entity: binary_sensor.cannabis_dispatch_health_critical
                icon: mdi:truck-alert-outline
                content_info: state
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Incident Storm
                icon: mdi:weather-lightning-rainy
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_storm
              - type: button
                name: Incident Intrusion
                icon: mdi:shield-alert
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_intrusion
              - type: button
                name: Incident Power
                icon: mdi:power-plug-off
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_power_failure
              - type: button
                name: Incident Clear
                icon: mdi:refresh
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    entity_id: script.incident_mode_clear
          - type: entities
            title: Escalation Controls
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_security_posture
              - entity: input_boolean.cannabis_site_a_perimeter_lockdown
              - entity: input_boolean.cannabis_site_a_vault_lock
              - entity: input_boolean.cannabis_security_intrusion
              - entity: input_boolean.cannabis_vault_exception_active
              - entity: input_boolean.cannabis_badge_system_degraded
              - entity: input_boolean.cannabis_transport_delay
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Incident Timeline (8h)
              show_states: true
            graph_span: 8h
            apex_config:
              chart:
                height: 300
                toolbar:
                  show: false
                animations:
                  enabled: false
            yaxis:
              - min: 0
                max: 1
            series:
              - entity: input_boolean.cannabis_security_intrusion
                name: Intrusion
                type: column
                color: '#ff595e'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_site_a_perimeter_lockdown
                name: Lockdown
                type: column
                color: '#ffca3a'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.cannabis_transport_delay
                name: Delay
                type: column
                color: '#1982c4'
                transform: "return x === 'on' ? 1 : 0;"
              - entity: input_boolean.qa_hold_active
                name: QA Hold
                type: line
                color: '#6a4c93'
                transform: "return x === 'on' ? 1 : 0;"
          - type: logbook
            title: Event Logbook
            entities:
              - input_boolean.cannabis_security_intrusion
              - input_boolean.cannabis_site_a_perimeter_lockdown
              - input_boolean.cannabis_vault_exception_active
              - input_boolean.cannabis_transport_delay
              - input_boolean.qa_hold_active
              - input_select.incident_mode
            hours_to_show: 8
      - type: grid
        cards:
          - type: entities
            title: Regulatory Action Stack
            show_header_toggle: false
            entities:
              - entity: sensor.compliance_open_items
              - entity: sensor.audit_completeness_pct
              - entity: sensor.metrc_sync_health
              - entity: sensor.transfer_queue_count
              - entity: sensor.custody_break_risk
              - entity: input_select.transfer_status
          - type: gauge
            entity: sensor.cannabis_dispatch_health_idx
            name: Dispatch Health
            min: 0
            max: 100
            severity:
              green: 70
              yellow: 45
              red: 0
          - type: gauge
            entity: sensor.cannabis_security_workload_idx
            name: Security Workload
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 45
              red: 70
      - type: grid
        cards:
          - type: heading
            heading: Extended Compliance
            heading_style: title
          - type: tile
            entity: input_number.cannabis_license_days_remaining
            name: License Days Remaining
          - type: tile
            entity: binary_sensor.cannabis_license_expiring_soon
            name: License Expiring Soon
          - type: tile
            entity: input_select.cannabis_coa_status
            name: COA Status
          - type: tile
            entity: input_number.cannabis_destruction_event_count
            name: Destruction Events
          - type: logbook
            title: Compliance Events (24h)
            hours_to_show: 24
            entities:
              - input_number.cannabis_license_days_remaining
              - input_select.cannabis_coa_status
              - binary_sensor.cannabis_license_expiring_soon

  - title: Site Operations Chamber

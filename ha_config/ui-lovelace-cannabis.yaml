  - title: Automation
    path: agents
    theme: cannabis_ops_theater
    background: "linear-gradient(rgba(4,8,18,0.46), rgba(4,8,18,0.46)), url(https://images.unsplash.com/photo-1740776013253-77a97581acec?w=1920&q=60&auto=format&fit=crop) center/cover no-repeat fixed"
    icon: mdi:robot
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: markdown
            content: |
              # Automation
              SOP automation, work orders, shift execution, and incident scripts.
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Ops Browser
                icon: mdi:web
                tap_action:
                  action: url
                  url_path: https://nowcoast.noaa.gov/
              - type: button
                name: Radar Feed
                icon: mdi:radar
                tap_action:
                  action: url
                  url_path: https://radar.weather.gov/
              - type: button
                name: Satellite Feed
                icon: mdi:satellite-uplink
                tap_action:
                  action: url
                  url_path: https://www.ospo.noaa.gov/Products/imagery/goes.html
              - type: button
                name: Wind Map
                icon: mdi:weather-windy
                tap_action:
                  action: url
                  url_path: https://www.windy.com/
          - type: entities
            title: SOP Control Surface
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_control_profile
              - entity: input_select.cannabis_shift_mode
              - entity: input_select.cannabis_site_focus
              - entity: input_text.cannabis_shift_supervisor
              - entity: input_text.cannabis_next_critical_task
              - entity: input_text.cannabis_dispatch_channel_status
          - type: entities
            title: Grow Stage SOPs — Change Room Stage
            show_header_toggle: false
            entities:
              - entity: input_select.cannabis_room_a_stage
                name: Room A Stage
              - entity: input_select.cannabis_room_b_stage
                name: Room B Stage
              - entity: input_select.cannabis_room_c_stage
                name: Room C Stage
              - entity: input_select.cannabis_room_d_stage
                name: Room D Stage
          - type: entities
            title: Shift Todo — IPM Scouting Tasks

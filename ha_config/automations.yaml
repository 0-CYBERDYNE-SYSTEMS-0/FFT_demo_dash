          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.agent_status
              data:
                value: "Compliance Mode — Audit Dashboard"
            - service: input_text.set_value
              target:
                entity_id: input_text.agent_commentary
              data:
                value: "METRC sync at 95%. Transfer queue clear. Audit completeness 93%. Chain-of-custody intact. No active holds."
        - conditions:
            - condition: state
              entity_id: input_select.demo_audience
              state: "Security Director"
          sequence:

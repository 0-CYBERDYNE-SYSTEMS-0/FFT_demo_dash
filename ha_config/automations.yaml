              target:
                entity_id: input_text.agent_status
              data:
                value: "Cultivation Mode — Grow Room Detail"
            - service: input_text.set_value
              target:
                entity_id: input_text.agent_commentary
              data:
                value: "All four rooms in active grow cycle. Room B approaching flush. PPFD 920 μmol, DLI 48. IPM pressure nominal."
        - conditions:
            - condition: state
              entity_id: input_select.demo_audience

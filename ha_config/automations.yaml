# Automations: time-of-day theming, weather-reactive triggers, scene/sequence/audience selectors

# ─── Time-of-Day Theming ────────────────────────────────────────────────────

- id: theme_dawn
  alias: "Theme: Dawn"
  trigger:
    - platform: sun
      event: sunrise
      offset: "-00:30:00"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: dawn

- id: theme_midday
  alias: "Theme: Midday"
  trigger:
    - platform: time
      at: "08:00:00"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: farm_ops_theater

- id: theme_dusk
  alias: "Theme: Dusk"
  trigger:
    - platform: sun
      event: sunset
      offset: "-01:00:00"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: dusk

- id: theme_night
  alias: "Theme: Night"
  trigger:
    - platform: sun
      event: sunset
      offset: "00:30:00"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: night

# ─── Weather-Reactive Automations ───────────────────────────────────────────

- id: storm_auto_trigger
  alias: "Weather: Auto-trigger storm mode (wind > 40 mph)"
  trigger:
    - platform: numeric_state
      entity_id: input_number.wind_speed
      above: 40
      for: "00:00:30"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: script.turn_on
      target:
        entity_id: script.incident_mode_storm

- id: storm_auto_clear
  alias: "Weather: Auto-clear storm mode (wind < 25 mph for 3 min)"
  trigger:
    - platform: numeric_state
      entity_id: input_number.wind_speed
      below: 25
      for: "00:03:00"
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Storm
  action:
    - action: script.turn_on
      target:
        entity_id: script.incident_mode_clear

- id: frost_auto_trigger
  alias: "Weather: Frost protection (outdoor temp < 35°F)"
  trigger:
    - platform: numeric_state
      entity_id: input_number.outdoor_temp_north
      below: 35
  condition:
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: frost
    - action: input_boolean.turn_on
      target:
        entity_id: switch.frost_protection
    - action: input_text.set_value
      target:
        entity_id: input_text.agent_status
      data:
        value: "Frost Protection Active"
    - action: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "⚠ Outdoor temp below 35°F. Frost protection enabled. Monitoring greenhouse heaters."

- id: harvest_mode_trigger
  alias: "Weather: Harvest conditions (75-85°F, low wind, daytime)"
  trigger:
    - platform: numeric_state
      entity_id: input_number.outdoor_temp_north
      above: 75
  condition:
    - condition: numeric_state
      entity_id: input_number.outdoor_temp_north
      below: 86
    - condition: numeric_state
      entity_id: input_number.wind_speed
      below: 15
    - condition: sun
      after: sunrise
      before: sunset
    - condition: state
      entity_id: input_select.incident_mode
      state: Normal
  action:
    - action: frontend.set_theme
      data:
        name: harvest


# ─── Audience Preset Selector ────────────────────────────────────────────────

- id: audience_preset_selector
  alias: "Demo: Audience preset selector"
  trigger:
    - platform: state
      entity_id: input_select.demo_audience
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.demo_audience
              state: "Investor"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.agent_status
              data:
                value: "Investor Mode — Financial KPIs"
            - service: input_text.set_value
              target:
                entity_id: input_text.agent_commentary
              data:
                value: "Welcome. Presenting Cedar Creek Farm investment portfolio: energy ROI, yield projections, and compliance readiness for Q2 review."

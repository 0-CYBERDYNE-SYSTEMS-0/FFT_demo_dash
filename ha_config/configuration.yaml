        unit_of_measurement: "%"
        friendly_name: "Cannabis Drone Anomaly Score"

      cannabis_staff_on_shift_total:
        value_template: "{{ states('input_number.cannabis_staff_on_shift_total') | float(96) | round(0) }}"
        unit_of_measurement: "staff"
        friendly_name: "Cannabis Staff On Shift"

      cannabis_work_orders_open:
        value_template: "{{ states('input_number.cannabis_work_orders_open') | float(38) | round(0) }}"
        unit_of_measurement: "work orders"
        friendly_name: "Cannabis Work Orders Open"

      cannabis_work_orders_overdue:
        value_template: "{{ states('input_number.cannabis_work_orders_overdue') | float(4) | round(0) }}"
        unit_of_measurement: "work orders"
        friendly_name: "Cannabis Work Orders Overdue"

      cannabis_schedule_adherence_pct:
        value_template: "{{ states('input_number.cannabis_schedule_adherence_pct') | float(93) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis Schedule Adherence"

      cannabis_transfer_eta_min:
        value_template: "{{ states('input_number.cannabis_transfer_eta_min') | float(85) | round(0) }}"
        unit_of_measurement: "min"
        friendly_name: "Cannabis Transfer ETA"

      cannabis_transport_risk_idx:
        value_template: "{{ states('input_number.cannabis_transport_risk_idx') | float(18) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis Transport Risk"

      cannabis_total_dried_flower_lbs:
        value_template: "{{ states('input_number.cannabis_total_dried_flower_lbs') | float(28340) | round(0) }}"
        unit_of_measurement: "lbs"
        friendly_name: "Cannabis Dried Flower Inventory"

      cannabis_total_extract_liters:
        value_template: "{{ states('input_number.cannabis_total_extract_liters') | float(3720) | round(0) }}"
        unit_of_measurement: "L"
        friendly_name: "Cannabis Extract Inventory"

      cannabis_total_packaged_units:
        value_template: "{{ states('input_number.cannabis_total_packaged_units') | float(246500) | round(0) }}"
        unit_of_measurement: "units"
        friendly_name: "Cannabis Packaged Units"

      cannabis_schedule_risk_idx:
        value_template: >
          {% set open = states('input_number.cannabis_work_orders_open') | float(38) %}
          {% set overdue = states('input_number.cannabis_work_orders_overdue') | float(4) %}
          {% set adherence = states('input_number.cannabis_schedule_adherence_pct') | float(93) %}
          {% set shortage = 22 if is_state('input_boolean.cannabis_staff_shortage_alert', 'on') else 0 %}
          {% set disruption = 18 if is_state('input_boolean.cannabis_schedule_disruption_active', 'on') else 0 %}
          {% set risk = (open * 0.18) + (overdue * 2.8) + ((100 - adherence) * 0.7) + shortage + disruption %}
          {{ [risk, 100] | min | round(1) }}
        unit_of_measurement: "%"
        friendly_name: "Cannabis Schedule Risk Index"

      cannabis_security_workload_idx:
        value_template: >
          {% set denials = states('input_number.cannabis_access_denied_events_1h') | float(3) %}
          {% set coverage = states('input_number.cannabis_guard_coverage_pct') | float(94) %}
          {% set intrusion = 28 if is_state('input_boolean.cannabis_security_intrusion', 'on') else 0 %}
          {% set lockdown = 16 if is_state('input_boolean.cannabis_site_a_perimeter_lockdown', 'on') else 0 %}
          {% set workload = (denials * 3.2) + ((100 - coverage) * 0.9) + intrusion + lockdown %}
          {{ [workload, 100] | min | round(1) }}
        unit_of_measurement: "%"
        friendly_name: "Cannabis Security Workload Index"

      cannabis_dispatch_health_idx:
        value_template: >
          {% set eta = states('input_number.cannabis_transfer_eta_min') | float(85) %}
          {% set risk = states('input_number.cannabis_transport_risk_idx') | float(18) %}
          {% set queue = states('input_number.transfer_queue_count') | float(2) %}
          {% set delay = 20 if is_state('input_boolean.cannabis_transport_delay', 'on') else 0 %}
          {% set health = 100 - ((eta / 8) + (risk * 0.8) + (queue * 2.5) + delay) %}
          {% set health = [health, 100] | min %}
          {% set health = [health, 0] | max %}
          {{ health | round(1) }}
        unit_of_measurement: "%"
        friendly_name: "Cannabis Dispatch Health"

      cannabis_weather_scene_url:
        value_template: >
          {% if is_state('binary_sensor.storm_alert', 'on') %}
            https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=1400&q=80&auto=format&fit=crop
          {% elif is_state('binary_sensor.frost_risk', 'on') %}
            https://images.unsplash.com/photo-1509117110144-ba4dffc8aa80?w=1400&q=80&auto=format&fit=crop
          {% elif is_state('binary_sensor.high_wind_alert', 'on') %}
            https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1400&q=80&auto=format&fit=crop
          {% elif is_state('binary_sensor.rain_detected', 'on') %}
            https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=1400&q=80&auto=format&fit=crop
          {% else %}
            https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1400&q=80&auto=format&fit=crop
          {% endif %}
        friendly_name: "Cannabis Weather Scene"

      cannabis_drone_scene_url:
        value_template: >
          {% set s = states('input_select.cannabis_drone_mission_state') %}
          {% if s == 'Survey' %}
            https://images.unsplash.com/photo-1508614589041-895b88991e3e?w=1200&q=80&auto=format&fit=crop
          {% elif s == 'Preflight' %}
            https://images.unsplash.com/photo-1473968512647-3e447244af8f?w=1200&q=80&auto=format&fit=crop
          {% elif s == 'Return' or s == 'Abort' %}
            https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1200&q=80&auto=format&fit=crop
          {% else %}
            https://images.unsplash.com/photo-1487887235947-a955ef187fea?w=1200&q=80&auto=format&fit=crop
          {% endif %}
        friendly_name: "Cannabis Drone Scene"

#############################################################
# BINARY SENSORS
#############################################################

binary_sensor:
  - platform: template
    sensors:
      # === WEATHER ALERTS ===
      heat_warning:
        value_template: "{{ states('sensor.greenhouse_temp_avg') | float(70) > 95 }}"
        friendly_name: "Heat Warning"
        
      high_wind_alert:
        value_template: "{{ states('input_number.wind_speed') | float(12) > 50 }}"
        friendly_name: "High Wind Alert"
        
      rain_detected:
        value_template: "{{ states('input_number.rainfall_today') | float(0) > 0 }}"
        friendly_name: "Rain Detected"
        
      storm_alert:
        value_template: "{{ states('input_number.barometric_pressure') | float(30.1) < 29.5 }}"
        friendly_name: "Storm Alert"

      # === MOISTURE ALERTS ===
      low_soil_moisture_north:
        value_template: "{{ states('input_number.soil_moisture_north_field') | float(45) < 25 }}"
        friendly_name: "Low Moisture - North Field"
        
      low_soil_moisture_south:
        value_template: "{{ states('input_number.soil_moisture_south_field') | float(52) < 25 }}"
        friendly_name: "Low Moisture - South Field"
        
      low_water_storage:
        value_template: "{{ (states('input_number.tank_level_main') | float(75000) + states('input_number.tank_level_secondary') | float(35000)) | float(110000) < 25000 }}"
        friendly_name: "Low Water Storage"

      # === TEMPERATURE ALERTS ===
      greenhouse_too_cold:
        value_template: "{{ states('sensor.greenhouse_temp_avg') | float(70) < 50 }}"
        friendly_name: "Greenhouse Too Cold"
        
      greenhouse_too_hot:
        value_template: "{{ states('sensor.greenhouse_temp_avg') | float(70) > 100 }}"
        friendly_name: "Greenhouse Too Hot"
        
      barn_too_cold:
        value_template: "{{ states('input_number.barn_temp') | float(55) < 40 }}"
        friendly_name: "Barn Too Cold"

      # === EQUIPMENT STATUS ===
      tractor_available:
        value_template: "{{ states('input_number.tractor_fuel') | float(65) > 20 }}"
        friendly_name: "Tractor Available"
        
      harvester_available:
        value_template: "{{ states('input_number.harvester_fuel') | float(82) > 20 }}"
        friendly_name: "Harvester Available"

      # === SECURITY ===
      motion_detected_barn:
        value_template: "{{ states('input_boolean.motion_sensor_barn') | default('off') == 'on' }}"
        friendly_name: "Motion Detected - Barn"
        
      motion_detected_equipment:
        value_template: "{{ states('input_boolean.motion_sensor_equipment') | default('off') == 'on' }}"
        friendly_name: "Motion Detected - Equipment"

      # === SYSTEM STATUS ===
      irrigation_active:
        value_template: >
          {{ states('input_boolean.irrigation_north_field') == 'on' or 
             states('input_boolean.irrigation_south_field') == 'on' or 
             states('input_boolean.irrigation_west_pasture') == 'on' or
             states('input_boolean.irrigation_east_orchard') == 'on' }}
        friendly_name: "Irrigation Active"
        
      pumps_running:
        value_template: >
          {{ states('input_boolean.pump_well_1') == 'on' or 
             states('input_boolean.pump_well_2') == 'on' or 
             states('input_boolean.pump_main_reservoir') == 'on' }}
        friendly_name: "Pumps Running"

      compliance_alert:
        value_template: >
          {{ (states('sensor.compliance_open_items') | float(0)) > 0 or
             is_state('input_boolean.qa_hold_active', 'on') or
             is_state('input_boolean.recall_readiness', 'off') }}
        friendly_name: "Compliance Alert"

      cannabis_coverage_gap:
        value_template: >
          {{ (states('input_number.cannabis_guard_coverage_pct') | float(94)) < 85 or
             is_state('input_boolean.cannabis_badge_system_degraded', 'on') }}
        friendly_name: "Cannabis Coverage Gap"

      cannabis_security_escalation_required:
        value_template: >
          {{ is_state('input_boolean.cannabis_security_intrusion', 'on') or
             is_state('input_boolean.cannabis_vault_exception_active', 'on') or
             (states('sensor.cannabis_security_workload_idx') | float(0)) > 70 }}
        friendly_name: "Cannabis Security Escalation Required"

      cannabis_drone_geofence_breach_active:
        value_template: "{{ is_state('input_boolean.cannabis_drone_geofence_breach', 'on') }}"
        friendly_name: "Cannabis Drone Geofence Breach Active"

      cannabis_camera_link_degraded_active:
        value_template: >
          {{ is_state('input_boolean.cannabis_camera_link_degraded', 'on') or
             (states('input_number.cannabis_camera_health_pct') | float(96)) < 75 }}
        friendly_name: "Cannabis Camera Link Degraded"

      cannabis_dispatch_health_critical:
        value_template: "{{ (states('sensor.cannabis_dispatch_health_idx') | float(100)) < 50 }}"
        friendly_name: "Cannabis Dispatch Health Critical"

template:
  - binary_sensor:
      - default_entity_id: binary_sensor.frost_risk
        name: Frost Risk
        state: "{{ states('sensor.outdoor_temp_avg') | float(58) < 35 }}"


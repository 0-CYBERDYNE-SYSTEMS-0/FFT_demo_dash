        unit_of_measurement: "alerts"
        friendly_name: "Cannabis Camera Alerts"

      cannabis_drone_progress_pct:
        value_template: "{{ states('input_number.cannabis_drone_progress_pct') | float(0) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis Drone Mission Progress"

      cannabis_drone_battery_pct:

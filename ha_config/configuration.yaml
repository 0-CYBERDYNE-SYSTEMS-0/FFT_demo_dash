#############################################################
# SYSTEM CONFIGURATION
#############################################################

# Enable the history and logbook
history:
logbook:

# Enable frontend
frontend:
  themes: !include_dir_merge_named themes

# API (enabled by default)
api:

# MQTT (for optional MQTT integration)
mqtt: []

# Sun integration for location-based sunrise/sunset calculations
sun:

# Automation
automation: !include automations.yaml

# Script
script: !include scripts.yaml

# Scene
scene: !include scenes.yaml

# HTTP Configuration with auth
http:
  server_port: 8123
  cors_allowed_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
    - 192.168.65.0/24

lovelace:
  mode: yaml
  resources:
    - url: /local/community/mushroom.js
      type: module
    - url: /local/community/button-card.js
      type: module
    - url: /local/community/mini-graph-card-bundle.js

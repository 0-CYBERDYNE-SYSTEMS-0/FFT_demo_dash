#############################################################
# TEMPLATE SENSORS
#############################################################

sensor:
  - platform: template
    sensors:
      # === SOIL MOISTURE ===
      soil_moisture_north:
        value_template: "{{ states('input_number.soil_moisture_north_field') | default(45) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - North Field"
        
      soil_moisture_south:
        value_template: "{{ states('input_number.soil_moisture_south_field') | default(52) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - South Field"
        
      soil_moisture_west_pasture:
        value_template: "{{ states('input_number.soil_moisture_west_pasture') | default(38) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - West Pasture"
        
      soil_moisture_east_orchard:
        value_template: "{{ states('input_number.soil_moisture_east_orchard') | default(55) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - East Orchard"
        
      soil_moisture_vegetable:
        value_template: "{{ states('input_number.soil_moisture_vegetable_field') | default(62) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - Vegetable Field"
        
      soil_moisture_nursery:
        value_template: "{{ states('input_number.soil_moisture_nursery') | default(70) }}"
        unit_of_measurement: "%"
        friendly_name: "Soil Moisture - Nursery"

      # === TEMPERATURES ===
      greenhouse_temp_a:
        value_template: "{{ states('input_number.greenhouse_temp_section_a') | float(72) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Greenhouse Temp - Section A"
        
      greenhouse_temp_b:
        value_template: "{{ states('input_number.greenhouse_temp_section_b') | float(68) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Greenhouse Temp - Section B"
        
      greenhouse_temp_c:
        value_template: "{{ states('input_number.greenhouse_temp_section_c') | float(75) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Greenhouse Temp - Section C"
        
      outdoor_temp_avg:
        value_template: "{{ ((states('input_number.outdoor_temp_north') | float(58) + states('input_number.outdoor_temp_south') | float(61) + states('input_number.outdoor_temp_west') | float(55) + states('input_number.outdoor_temp_east') | float(59)) / 4) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Average Outdoor Temperature"

      # === WATER LEVELS ===
      water_tank_main:
        value_template: "{{ states('input_number.tank_level_main') | default(75000) }}"
        unit_of_measurement: "gal"
        friendly_name: "Main Water Reservoir"
        
      water_tank_secondary:
        value_template: "{{ states('input_number.tank_level_secondary') | default(35000) }}"
        unit_of_measurement: "gal"
        friendly_name: "Secondary Water Tank"
        
      water_tank_nursery:
        value_template: "{{ states('input_number.tank_level_nursery') | default(4200) }}"
        unit_of_measurement: "gal"
        friendly_name: "Nursery Water Tank"
        
      water_tank_total:
        value_template: "{{ (states('input_number.tank_level_main') | float(75000) + states('input_number.tank_level_secondary') | float(35000) + states('input_number.tank_level_nursery') | float(4200)) | int }}"
        unit_of_measurement: "gal"
        friendly_name: "Total Water Storage"

      # === POWER ===
      solar_power:
        value_template: "{{ states('input_number.solar_generation_kw') | float(125) | round(1) }}"
        unit_of_measurement: "kW"
        friendly_name: "Solar Power Generation"
        
      power_consumption:
        value_template: "{{ states('input_number.grid_power_consumption') | float(45) | round(1) }}"
        unit_of_measurement: "kW"
        friendly_name: "Grid Power Consumption"
        
      battery_level:
        value_template: "{{ states('input_number.battery_storage_pct') | default(85) }}"
        unit_of_measurement: "%"
        friendly_name: "Battery Storage"

      # === HUMIDITY ===
      greenhouse_humidity_avg:
        value_template: "{{ ((states('input_number.greenhouse_humidity_a') | float(65) + states('input_number.greenhouse_humidity_b') | float(72) + states('input_number.greenhouse_humidity_c') | float(58)) / 3) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Average Greenhouse Humidity"

      # === WIND ===
      wind_speed_mph:
        value_template: "{{ states('input_number.wind_speed') | float(12) | round(1) }}"
        unit_of_measurement: "mph"
        friendly_name: "Wind Speed"
        
      wind_direction_cardinal:
        value_template: >
          {% set directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'] %}
          {% set degrees = states('input_number.wind_direction') | float(0) %}
          {{ directions[(degrees / 22.5) | int % 16] }}
        friendly_name: "Wind Direction"

      weather_feed_nws_radar_url:
        value_template: "https://radar.weather.gov/station/KEWX/standard"
        friendly_name: "Weather Feed - NWS Radar URL"

      weather_feed_noaa_goes_url:
        value_template: "https://www.ospo.noaa.gov/Products/imagery/goes.html"
        friendly_name: "Weather Feed - NOAA GOES URL"

      weather_feed_accuweather_url:
        value_template: "https://www.accuweather.com/en/us/cedar-creek/78612/weather-radar/2237310"
        friendly_name: "Weather Feed - AccuWeather URL"

      weather_feed_accuweather_fallback_url:
        value_template: "https://weather.com/weather/radar/interactive/l/Cedar+Creek+Texas+78612?canonicalCityId=cf67a4c97b40210d2ff2e6418fe24284"
        friendly_name: "Weather Feed - AccuWeather Fallback URL"

      # === LIVESTOCK ===
      barn_temperature:
        value_template: "{{ states('input_number.barn_temp') | float(55) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Barn Temperature"
        
      chicken_count:
        value_template: "{{ states('input_number.chicken_count') | default(142) }}"
        unit_of_measurement: "head"
        friendly_name: "Chicken Count"
        
      cattle_count:
        value_template: "{{ states('input_number.cattle_count') | default(48) }}"
        unit_of_measurement: "head"
        friendly_name: "Cattle Count"

      # === YIELDS ===
      grain_yield:
        value_template: "{{ states('input_number.yield_grain_current') | default(15250) }}"
        unit_of_measurement: "bu"
        friendly_name: "Grain Yield"

      greenhouse_temp_avg:
        value_template: "{{ ((states('sensor.greenhouse_temp_a') | float(72) + states('sensor.greenhouse_temp_b') | float(68) + states('sensor.greenhouse_temp_c') | float(75)) / 3) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Average Greenhouse Temperature"

      farm_risk_index:
        value_template: >
          {% set risk = 0 %}
          {% if is_state('binary_sensor.storm_alert', 'on') %}{% set risk = risk + 24 %}{% endif %}
          {% if is_state('binary_sensor.low_water_storage', 'on') %}{% set risk = risk + 24 %}{% endif %}
          {% if is_state('binary_sensor.heat_warning', 'on') %}{% set risk = risk + 14 %}{% endif %}
          {% if is_state('binary_sensor.high_wind_alert', 'on') %}{% set risk = risk + 14 %}{% endif %}
          {% if is_state('binary_sensor.motion_detected_equipment', 'on') %}{% set risk = risk + 10 %}{% endif %}
          {% if is_state('binary_sensor.motion_detected_barn', 'on') %}{% set risk = risk + 8 %}{% endif %}
          {% if is_state('switch.perimeter_alarm', 'on') %}{% set risk = risk + 6 %}{% endif %}
          {% set risk = risk + ((100 - (states('sensor.battery_level') | float(85))) * 0.12) %}
          {% set risk = risk + ((100 - (states('input_number.generator_fuel_level') | float(92))) * 0.08) %}
          {% set risk = [risk, 100] | min %}
          {% set risk = [risk, 0] | max %}
          {{ risk | round(0) | int }}
        unit_of_measurement: "%"
        friendly_name: "Farm Risk Index"

      ops_efficiency_index:
        value_template: >
          {% set solar = states('sensor.solar_power') | float(0) %}
          {% set load = states('sensor.power_consumption') | float(1) %}
          {% set battery = states('sensor.battery_level') | float(0) %}
          {% set water = (states('sensor.water_tank_total') | float(0) / 120000 * 100) %}
          {% set moisture_avg = (
            states('sensor.soil_moisture_north') | float(45) +
            states('sensor.soil_moisture_south') | float(52) +
            states('sensor.soil_moisture_west_pasture') | float(38) +
            states('sensor.soil_moisture_east_orchard') | float(55) +
            states('sensor.soil_moisture_vegetable') | float(62) +
            states('sensor.soil_moisture_nursery') | float(70)
          ) / 6 %}
          {% set moisture_score = 100 - (((moisture_avg - 55) | abs) * 2.2) %}
          {% set solar_ratio = (solar / (load if load > 0 else 1)) * 100 %}
          {% set solar_score = [solar_ratio, 100] | min %}
          {% set score = (solar_score * 0.30) + (battery * 0.25) + (water * 0.25) + (moisture_score * 0.20) %}
          {% set score = [score, 100] | min %}
          {% set score = [score, 0] | max %}
          {{ score | round(0) | int }}
        unit_of_measurement: "%"
        friendly_name: "Ops Efficiency Index"

      anomaly_score:
        value_template: >
          {% set a = states('sensor.greenhouse_temp_a') | float(72) %}
          {% set b = states('sensor.greenhouse_temp_b') | float(68) %}
          {% set c = states('sensor.greenhouse_temp_c') | float(75) %}
          {% set spread = ([a, b, c] | max) - ([a, b, c] | min) %}
          {% set score = spread * 6 %}
          {% if is_state('binary_sensor.low_soil_moisture_north', 'on') %}{% set score = score + 16 %}{% endif %}
          {% if is_state('binary_sensor.low_soil_moisture_south', 'on') %}{% set score = score + 16 %}{% endif %}
          {% if is_state('input_boolean.alert_equipment_fault', 'on') %}{% set score = score + 28 %}{% endif %}
          {% if is_state('switch.backup_generator', 'on') and (states('sensor.solar_power') | float(0) > 80) %}{% set score = score + 8 %}{% endif %}
          {% if (states('sensor.wind_speed_mph') | float(0)) > 40 %}{% set score = score + 10 %}{% endif %}
          {% set score = [score, 100] | min %}
          {% set score = [score, 0] | max %}
          {{ score | round(0) | int }}
        unit_of_measurement: "%"
        friendly_name: "Anomaly Score"

      # === COMPLIANCE + TRACEABILITY ===
      transfer_queue_count:
        value_template: "{{ states('input_number.transfer_queue_count') | float(2) | round(0) }}"
        unit_of_measurement: "loads"
        friendly_name: "Transfer Queue Count"

      audit_completeness_pct:
        value_template: "{{ states('input_number.audit_completeness_pct') | float(93) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Audit Completeness"

      qa_release_readiness:
        value_template: "{{ states('input_number.qa_release_readiness') | float(88) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "QA Release Readiness"

      metrc_sync_health:
        value_template: "{{ states('input_number.metrc_sync_health') | float(95) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "METRC Sync Health"

      custody_break_risk:
        value_template: "{{ states('input_number.custody_break_risk') | float(6) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Custody Break Risk"

      compliance_open_items:
        value_template: >
          {% set items = 0 %}
          {% if is_state('input_boolean.qa_hold_active', 'on') %}{% set items = items + 2 %}{% endif %}
          {% if is_state('input_boolean.recall_readiness', 'off') %}{% set items = items + 2 %}{% endif %}
          {% if (states('sensor.audit_completeness_pct') | float(0)) < 90 %}{% set items = items + 1 %}{% endif %}
          {% if (states('sensor.metrc_sync_health') | float(0)) < 92 %}{% set items = items + 1 %}{% endif %}
          {% if (states('sensor.transfer_queue_count') | float(0)) > 12 %}{% set items = items + 1 %}{% endif %}
          {{ items }}
        unit_of_measurement: "items"
        friendly_name: "Compliance Open Items"

      # === CANNABIS DIGITAL TWIN (DERIVED) ===
      cannabis_air_temp_f:
        value_template: "{{ states('input_number.cannabis_site_a_flower_air_temp_f') | float(76) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Cannabis Air Temperature"

      cannabis_leaf_temp_f:
        value_template: "{{ states('input_number.cannabis_site_a_flower_leaf_temp_f') | float(74) | round(1) }}"
        unit_of_measurement: "°F"
        friendly_name: "Cannabis Leaf Temperature"

      cannabis_rh_pct:
        value_template: "{{ states('input_number.cannabis_site_a_flower_rh_pct') | float(57) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis Relative Humidity"

      cannabis_co2_ppm:
        value_template: "{{ states('input_number.cannabis_site_a_flower_co2_ppm') | float(1050) | round(0) }}"
        unit_of_measurement: "ppm"
        friendly_name: "Cannabis CO2"

      cannabis_ppfd:
        value_template: "{{ states('input_number.cannabis_site_a_flower_ppfd') | float(850) | round(0) }}"
        unit_of_measurement: "umol/m2/s"
        friendly_name: "Cannabis PPFD"

      cannabis_dli:
        value_template: "{{ states('input_number.cannabis_site_a_flower_dli') | float(38) | round(1) }}"
        unit_of_measurement: "mol/m2/day"
        friendly_name: "Cannabis DLI"

      cannabis_dewpoint_f:
        value_template: >
          {% set t = states('input_number.cannabis_site_a_flower_air_temp_f') | float(76) %}
          {% set rh = states('input_number.cannabis_site_a_flower_rh_pct') | float(57) %}
          {{ (t - ((100 - rh) / 5)) | round(1) }}
        unit_of_measurement: "°F"
        friendly_name: "Cannabis Dewpoint"

      cannabis_env_vpd_kpa:
        value_template: >
          {% set air_f = states('input_number.cannabis_site_a_flower_air_temp_f') | float(76) %}
          {% set leaf_f = states('input_number.cannabis_site_a_flower_leaf_temp_f') | float(74) %}
          {% set rh = states('input_number.cannabis_site_a_flower_rh_pct') | float(57) %}
          {% set delta = (air_f - leaf_f) | abs %}
          {% set vpd = (delta * 0.03) + ((100 - rh) * 0.02) %}
          {{ vpd | round(2) }}
        unit_of_measurement: "kPa"
        friendly_name: "Cannabis VPD"

      cannabis_hvac_load_pct:
        value_template: "{{ states('input_number.cannabis_site_a_hvac_load_pct') | float(62) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis HVAC Load"

      cannabis_dehu_load_pct:
        value_template: "{{ states('input_number.cannabis_site_a_dehu_load_pct') | float(54) | round(1) }}"
        unit_of_measurement: "%"
        friendly_name: "Cannabis Dehumidification Load"

      cannabis_zone_cycles:
        value_template: >
          {{ (states('input_number.cannabis_irrigation_zone_a_cycles') | float(18)
             + states('input_number.cannabis_irrigation_zone_b_cycles') | float(15)) | round(0) }}
        unit_of_measurement: "cycles"
        friendly_name: "Cannabis Irrigation Zone Cycles"

      cannabis_ec_in:
        value_template: "{{ states('input_number.cannabis_fertigation_ec_in') | float(2.1) | round(2) }}"
        unit_of_measurement: "mS/cm"
        friendly_name: "Cannabis Fertigation EC In"

      cannabis_ph_in:

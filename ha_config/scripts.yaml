# ─── Demo Sequences ───────────────────────────────────────────────────────────

demo_sequence_full_day:
  alias: "Demo: Full Day at Cedar Creek"
  mode: single
  sequence:
    - service: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "Good morning. 6:14 AM at Cedar Creek Farm. Initializing dawn operations. Irrigation sequence beginning."
    - service: script.turn_on
      target:
        entity_id: script.scene_morning_irrigation_pulse
    - delay: "00:00:30"
    - service: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "Operations nominal. Solar generation climbing. NWS monitoring active. No advisories."
    - service: frontend.set_theme
      data:
        name: farm_ops_theater
    - delay: "00:00:30"
    - service: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "⚠ NWS advisory confirmed. Storm cell 12 miles SW. ETA 15 minutes. Initiating storm protocol."
    - delay: "00:00:10"
    - service: script.turn_on
      target:
        entity_id: script.incident_mode_storm
    - delay: "00:00:30"
    - service: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "Storm passing. Wind subsiding. Damage assessment in progress. All critical systems intact."
    - service: script.turn_on
      target:
        entity_id: script.incident_mode_clear
    - delay: "00:00:05"
    - service: script.turn_on
      target:
        entity_id: script.scene_vip_tour
    - service: input_text.set_value
      target:
        entity_id: input_text.agent_commentary
      data:
        value: "All systems recovered. Farm operating at optimal capacity. Ready for inspection."


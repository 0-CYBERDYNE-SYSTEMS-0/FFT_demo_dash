<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#122643"/>
      <stop offset="1" stop-color="#080e17"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#183861"/>
      <stop offset="1" stop-color="#0d1d31"/>
    </linearGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="rgba(255,255,255,0.015)"/>
      <rect y="3" width="6" height="1" fill="rgba(48,231,191,0.08)"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="60" y="130" width="1160" height="540" rx="24" fill="#0d1626" stroke="#4da8ff" stroke-opacity="0.42"/>
  <rect x="88" y="170" width="1104" height="460" rx="18" fill="url(#horizon)"/>
  <rect x="88" y="170" width="1104" height="460" rx="18" fill="url(#scan)"/>

  <rect x="120" y="470" width="1040" height="130" fill="#132844" opacity="0.82"/>
  <rect x="160" y="420" width="130" height="80" fill="#223f63" opacity="0.8"/>
  <rect x="358" y="392" width="150" height="108" fill="#284d79" opacity="0.8"/>
  <rect x="606" y="400" width="260" height="100" fill="#183556" opacity="0.8"/>

  <circle cx="220" cy="98" r="12" fill="#ff5d67">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <text x="252" y="104" fill="#d8ecff" font-size="28" font-family="Rajdhani, Segoe UI, Arial">NORTH YARD // LIVE MONITOR</text>

  <rect x="96" y="186" width="1088" height="3" fill="#35d39d" opacity="0.6">
    <animate attributeName="y" values="186;620;186" dur="5.8s" repeatCount="indefinite"/>
  </rect>

  <g>
    <rect x="140" y="270" width="32" height="22" rx="4" fill="#8fd2ff" opacity="0.9">
      <animate attributeName="x" values="140;1010;140" dur="16s" repeatCount="indefinite"/>
    </rect>
    <rect x="102" y="295" width="96" height="2" fill="#8fd2ff" opacity="0.6">
      <animate attributeName="x" values="102;972;102" dur="16s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="110" y="222" fill="#89b6df" font-size="18" font-family="Rajdhani, Segoe UI, Arial">PERIMETER SWEEP ACTIVE</text>
  <text x="110" y="664" fill="#35d39d" font-size="18" font-family="Rajdhani, Segoe UI, Arial">STATUS: ONLINE</text>
  <text x="928" y="664" fill="#8eb1d5" font-size="16" font-family="Rajdhani, Segoe UI, Arial">FPS 30 | LAT 41ms</text>
</svg>

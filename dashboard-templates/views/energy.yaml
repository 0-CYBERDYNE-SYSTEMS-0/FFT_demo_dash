# Energy View Template
# Generation, load, battery behavior, and grid dependence
#
# Customization points:
# - Adjust solar/consumption entities for your setup
# - Modify battery entity for your storage system
# - Add fuel monitoring entities as needed

title: Energy
path: energy
icon: mdi:solar-power
type: sections
max_columns: 3
dense_section_placement: true
sections:
  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: Energy Intelligence
        subtitle: Generation, load, battery behavior, and grid dependence
      - type: custom:apexcharts-card
        header:
          show: true
          title: Mixed Area/Line Energy Model (6h)
          show_states: true
        graph_span: 6h
        apex_config:
          chart:
            height: 280
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width: 2
          dataLabels:
            enabled: false
          legend:
            show: true
            position: top
            horizontalAlign: left
          grid:
            borderColor: '#22324a'
            strokeDashArray: 3
          tooltip:
            shared: true
            intersect: false
            x:
              format: HH:mm
        all_series_config:
          group_by:
            func: avg
            duration: 10min
        yaxis:
          - id: power
            min: 0
            max: 250
          - id: battery
            opposite: true
            min: 0
            max: 100
        series:
          - entity: sensor.solar_power
            name: Solar
            yaxis_id: power
            type: area
            color: '#fbbf24'
          - entity: sensor.power_consumption
            name: Consumption
            yaxis_id: power
            type: line
            color: '#fb7185'
          - entity: sensor.battery_level
            name: Battery %
            yaxis_id: battery
            type: line
            color: '#34d399'
      - type: custom:apexcharts-card
        header:
          show: true
          title: Multi-Bar Energy Snapshot
        graph_span: 1h
        apex_config:
          chart:
            type: bar
            height: 260
            toolbar:
              show: false
            animations:
              enabled: false
          plotOptions:
            bar:
              horizontal: false
              columnWidth: 55%
              borderRadius: 4
          dataLabels:
            enabled: false
          legend:
            show: true
            position: top
            horizontalAlign: left
          grid:
            borderColor: '#22324a'
            strokeDashArray: 3
        series:
          - entity: sensor.solar_power
            name: Solar
            type: column
          - entity: sensor.power_consumption
            name: Use
            type: column
          - entity: input_number.grid_power_consumption
            name: Grid
            type: column
  - type: grid
    cards:
      - type: entities
        title: Energy Inputs
        entities:
          - input_number.solar_generation_kw
          - input_number.grid_power_consumption
          - input_number.battery_storage_pct
          - input_number.generator_fuel_level
      - type: statistics-graph
        title: 24h Statistical Envelope
        days_to_show: 1
        chart_type: bar
        stat_types:
          - min
          - mean
          - max
        entities:
          - sensor.solar_power
          - sensor.power_consumption
          - sensor.battery_level
      - type: entity-filter
        title: Power Alerts
        show_empty: false
        state_filter:
          - 'on'
        entities:
          - binary_sensor.low_water_storage
          - binary_sensor.storm_alert
      - type: custom:apexcharts-card
        header:
          show: true
          title: Generator and Fuel (6h)
        graph_span: 6h
        apex_config:
          chart:
            height: 260
            animations:
              enabled: false
          stroke:
            curve: smooth
          legend:
            show: true
            position: top
            horizontalAlign: left
          grid:
            borderColor: '#22324a'
        yaxis:
          - min: 0
            max: 100
        series:
          - entity: input_number.generator_fuel_level
            name: Fuel %
            color: '#f59e0b'
          - entity: input_number.battery_storage_pct
            name: Battery %
            color: '#34d399'

<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Option C - Analyst Hybrid</title>
<style>
:root{--bg:#080b12;--p:#101827;--line:#23324a;--t:#ecf3ff;--m:#9eb2d5}
body{margin:0;background:var(--bg);color:var(--t);font-family:ui-sans-serif,system-ui}*{box-sizing:border-box}
.grid{max-width:1600px;margin:0 auto;padding:18px;display:grid;gap:12px;grid-template-columns:repeat(12,1fr)}
.card{background:var(--p);border:1px solid #24354d;border-radius:12px;padding:12px}.h{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.08em}
svg{width:100%;height:100%}
</style></head><body><div class="grid">
<div class="card" style="grid-column:span 12;height:90px"><div class="h">Analyst Hybrid Header</div><div style="display:flex;gap:20px;margin-top:10px"><b>Agents: 4</b><b>Pumps: 3</b><b>Warnings: 2</b><b>Telemetry Tick: 5s</b></div></div>
<div class="card" style="grid-column:span 7;height:320px"><div class="h">Tri-Line System Dynamics</div><svg id="a" viewBox="0 0 760 260"></svg></div>
<div class="card" style="grid-column:span 5;height:320px"><div class="h">Clustered Multi-Bar Zones</div><svg id="b" viewBox="0 0 520 260"></svg></div>
<div class="card" style="grid-column:span 4;height:260px"><div class="h">Ops</div><ul style="line-height:1.9;color:#c2d2ee"><li>irrigation_nursery ON</li><li>pump_main ON</li><li>greenhouse_cooling_c ON</li></ul></div>
<div class="card" style="grid-column:span 8;height:260px"><div class="h">Multi-Area Technical Trend</div><svg id="c" viewBox="0 0 860 220"></svg></div>
</div>
<script>
const n=40, S=(v,a,b,y,h)=>y+h-(v-a)*(h/(b-a));
const r=(a,b)=>a+Math.random()*(b-a);const x=(i,w,n)=>40+i*(w/(n-1));
const p=(d,w,h,min,max)=>d.map((v,i)=>`${i?'L':'M'}${x(i,w,d.length)},${S(v,min,max,20,h)}`).join(' ');
const d1=[...Array(n)].map((_,i)=>r(40,70)+Math.sin(i/5)*9),d2=[...Array(n)].map((_,i)=>r(30,62)+Math.cos(i/6)*8),d3=[...Array(n)].map((_,i)=>r(70,95)+Math.sin(i/7)*4);
const a=document.getElementById('a');a.innerHTML=`<path d='${p(d1,680,210,0,100)}' stroke='#22d3ee' fill='none' stroke-width='2'/><path d='${p(d2,680,210,0,100)}' stroke='#34d399' fill='none' stroke-width='2'/><path d='${p(d3,680,210,0,100)}' stroke='#f59e0b' fill='none' stroke-width='2'/>`;
const b=document.getElementById('b');const z=[52,64,46,59,70,67];let bh='';z.forEach((v,i)=>{bh+=`<rect x='${40+i*72}' y='${230-v*1.8}' width='46' height='${v*1.8}' fill='${i%3===0?'#38bdf8':i%3===1?'#4ade80':'#fbbf24'}' rx='6'/>`});b.innerHTML=bh;
const c=document.getElementById('c');const e1=[...Array(n)].map((_,i)=>r(50,95)+Math.sin(i/7)*6),e2=[...Array(n)].map((_,i)=>r(20,60)+Math.cos(i/5)*7);
const area=(d,w,h,min,max,color)=>`<path d='${p(d,w,h,min,max)} L${x(n-1,w,n)},230 L40,230 Z' fill='${color}'/>`; c.innerHTML=area(e1,760,210,0,120,'rgba(56,189,248,.25)')+area(e2,760,210,0,120,'rgba(250,204,21,.25)');
</script></body></html>
